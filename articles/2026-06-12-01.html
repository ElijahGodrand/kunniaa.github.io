        const TITLE = '牛马：从自救到登基';
        const CONTENT = `《置身钉内》作者幽素之前没在大厂干过，进了钉钉，太实在了，真干活真玩命，一年之内被救护车拉走两次。她不明白，进大厂要靠真本事，但进了大厂之后主要靠演技，不能只干活，干得越多，身体越糟，精神越惨。

阿里人出了名了善于表演。活得滋润的人是怎么干的？他们白天摸鱼、假寐，养精蓄锐，快下班了开始开会，半夜两三点发通知、发总结、发报告。发东西的时候很讲究，要@自己的领导、@对方的领导、最好把所有大领导都@上，邀请领导看“特供”演出。

现在咱们换个角度。假设这是一个宇宙大型游戏，你是一个玩家，要扮演一头牛马，进入大厂这个副本。

游戏规则极其苛刻：必须待满一年，不能辞职，不能进ICU，不能有任何负面记录，还要学到东西，玩家和同事之间没有信任关系，绩效考核强制分布，一个人上就意味着另一个人下，所有人对所有人的战争。玩家没有稀缺性，外面有三千人等着顶替。公司违法成本极低，没有加班费，监察和仲裁都没用，别指望任何外部帮助。不能请病假，每天必须完成高强度KPI，没有任何外界支持，家人不理解，朋友帮不上忙，没有存款。玩家已经出现了失眠、心悸、胃病这些轻度健康问题。

再加一条更狠的：玩家已经跟所有同事、领导、甚至保洁阿姨关系都很差，已经被持续打低绩效，领导已经把开除邮件写好了，鼠标就在发送按钮上，下一秒玩家就得滚蛋。

在这种极端条件下，作为玩家，要怎么操作才能活下来？

先解决最急迫的问题：开除前夜怎么救自己？玩家敲门进领导办公室，语气要平静，像做故障复盘。玩家就这么说：“某总，我要滚蛋了吧？对不起，是我的错。这几个月业绩很差，任务延期，没人愿意跟我合作。我有一个请求，再给我最后一次机会。某某大问题，一直没人搞。给我三个星期，搞不定，给我打最差的绩效，我自己走人，对团队没有任何损失，我还能帮大家背个绩效。”

说完看领导反应。如果领导说“那活你不用管了”，那就完蛋了，没机会了，点头说谢谢，出门收拾东西准备走人。如果领导沉默，有戏，玩家就在那儿等着，别说话，大概率会给机会。如果领导说“你先回去”，“你愿意干就干吧”，全力开干。

这个策略为什么有用？关键在于玩家要把自己定位成一个纯牛马。纯牛马的意思是：不挑食、不踢人、不惹麻烦、用完就能扔。所以注意，不要打感情牌，别说“我家里有房贷车贷，开了我就等于逼死我”，领导一听会觉得玩家是个定时炸弹，更想开。不要表忠心当狗，别说“我愿意留下来给你当狗，打探消息”，领导会觉得玩家脑子有问题。不要提工资，别说“这几个月的工资我不要了，我给公司白干”，大厂不差这点钱，这么做反而给薪酬体系上下一系列人添麻烦。就认错，然后请求干脏活，让领导觉得玩家是个好牛马。对领导来说，这个方案只有好处没有坏处。

然后疯狂干活，把那坨烂活搞定。即使没有完美解决，只要解决了七七八八，领导会想，这牛马还不错，继续用着看看。玩家就留下来了。

再往下是一年期的生存问题。先保护精神，再保护身体。

保护精神就是保护内分泌，人在高度博弈的环境里，情绪太多，内分泌太旺盛，从下丘脑到肾上腺一大堆东西开始分泌，把人搞得乱七八糟，搞出一堆慢性病。

罗素说，“动物只要不生病，有足够的食物，便快乐了”，《幸福之路》，第一句。人做不到动物那样，解决方式只有一条，给自己设置一个完全属于自己的优先级最高的“主线任务”，给自己编一个角色。

比如玩家是一个卧底视频博主，来大厂就是为了拍黑心工厂怎么压榨人的，要做一个一亿播放量的视频。是一个调查记者，来调查黑心工厂的内幕。准备创业，来偷师学艺，搞清楚这个项目的所有东西，以后出去复制。玄乎一点，玩家可以把自己想象成一个来自玄幻世界的小精灵，来人间体验各种痛苦和快乐。

玩家带着这种心态，再被领导骂、被打低绩效，内心会波动吗？不会的。玩家想，我他妈就是来收集材料的，你这些屌东西对我有什么用？就这么简单。有主线任务，玩家的内分泌就稳了，累归累，但心里不苦，到家倒头就睡。

这个主线任务要每天强化，写下来做成屏保，每天早中晚各念一遍，一天至少三次。不强化就会忘，忘了玩家就又变回那个被领导骂了就难受的老实人了。

玩家的命在直属领导手里，干活之外，大部分心思要花在哄领导上。

让领导觉得他比玩家强。玩家做得再好，也要让领导觉得是他的功劳。汇报时加前缀，比如“按照您上次的指示”、“在您的带领下”。被别人夸的时候要说“主要是某某总及时调整了优先级”。领导觉得舒服了，玩家在领导眼里就越顺眼，越不容易被开。

永远给领导做选择题，别让他做简答题，简答题累。错误问法是“领导，这个问题怎么解决？”这是简答题，领导要动脑子，会烦。正确问法是“领导，这个问题有A、B、C三个方案，您看哪个好？”这是选择题，领导打个勾就行，省脑子，他开心。

少说多做，结论要短。汇报时先说结论，比如“某某任务完成了百分之八十，预计明天搞定”。说越多破绽越多。如果领导问了一个玩家没想好的问题，就说“这个问题我再考虑一下”。

当面不跟领导争输赢。如果领导错了，玩家私下找时间这样说：“领导，这个事情我考虑了一下，不知道我的想法成不成熟。我是这么想的……您看看我哪里想得不对？”让领导觉得是玩家错了，他在指导玩家。千万别让领导觉得是他错了，玩家在教他做事，那样就完蛋了。

制造一点不可替代性。玩家不需要在核心业务上不可替代，这是必须可替换的，要在某个不起眼的小环节成为唯一知道怎么弄的人就行。比如历史文档，历史无文档，某个复杂的配置。

多讲利益，要给他算账，这个活干完团队的KPI能涨多少，能超过哪个其他团队。注意，别说“你的KPI”，要说“团队的KPI”，绕一个弯他就不会觉得玩家是在用利益引导他。

不站队。跟所有人保持不远不近的关系，不交心，不参与派别，谁都不得罪，不要批评任何人。

要出现在领导视野里，主动汇报，主动认领脏活。领导会觉得这人虽然差，但还在正常运转，还在努力，除非迫不得已没必要开掉。

主动背锅。业绩不好的时候主动说：“对不起，我没搞好，给我打C绩效吧，我来背。”背C绩效对很多人来说是不开心的事，因为升职加薪没希望了，所以玩家愿意背，领导会觉得玩家很有情绪价值。他以后需要人背锅的时候会找玩家，但不会连续让玩家背，因为连续背会被开掉，损失一个背锅侠很可惜。

偶尔让领导的领导知道玩家。在跨部门会议上亮个相，让大领导觉得玩家这人还行。这对玩家直属领导来说是好事，因为他的领导注意到他的团队有优秀人才，是加分项。但千万别做太多，最多一个月在周报里提一句。做多了领导会觉得玩家想越级搞事，反而麻烦。领导想开玩家的时候会想到“我的领导对这个人有印象，开了会不会有影响”。

哄领导保七成血条。照顾身体保两成血条。身体健康主要靠表演和忽悠，不是靠干活。越干活身体越差，越会表演身体越好。

保证睡眠，每天必须睡够六小时。如果加班到凌晨两点，第二天发消息说“昨晚发版到两点，为保证今天不出错，我要10点到”，然后立刻睡觉。出现胸闷、眼前发黑、半边发麻，直接去急诊，急诊记录是不可抗力证明。注意，去急诊和去ICU不一样，去急诊是保护自己，去ICU是身体完蛋了，千万别硬扛到进ICU。在公司备一个生存包，包括睡袋、眼罩、枕头，确保睡觉时不受打扰。利用碎片时间休息，等汇报的时候闭眼深呼吸，能睡就睡。开会时如果内容跟玩家没关系，两眼放空，大脑待机。散会后立刻去厕所隔间闭眼休息五分钟十分钟，别人以为玩家在蹲马桶，安全。在工位上每隔五十分钟站起来走一走，每天中午戴眼罩睡二十分钟，下午吃坚果喝温水，每天咖啡不超过两杯。不要吃高碳精致水，吃粗粮，多吃蔬菜和白肉，不要重油重盐重味精。备好维生素A、C、D、辅酶Q10等补剂。

表演方面也有技巧。不要说熬了几个通宵，要说“这块我刚研究完，顺手搞定了”。说自己很累很辛苦，让别人觉得欠了玩家什么东西，这种欠债的感觉会让别人不舒服，对方会想：你让我觉得欠你人情，那我就把这个债还了，还完之后咱们两不相欠，我也就轻松了。然后他不想再跟玩家打交道，反过来，玩家显得毫不费力，别人就不觉得欠债，心情就会很轻松。

这就好比送礼，一定要送那种让对方不觉得累的礼。如果玩家送的礼让对方觉得有压力、觉得欠玩家，对方就会想办法还掉，然后跟玩家保持距离。只有玩家送得轻松、顺手、没负担，对方才会真的开心。永远不要表现得很辛苦，要表现得举重若轻。偶尔犯点小错，比如邮件写错字、打翻咖啡，让人觉得玩家是真人。完全不出错的人不是真人，是演员。

最后一成血条是跟同事相处。核心原则是做一个无害的人。不得罪人，不八卦，不站队。主动帮忙取快递、修电脑，不求回报。

要留一些“手牌”，永远不用但心里有底，比如收集但不使用不合规的录音、关键文档备份、违规截图。警惕“免费的午餐”，有人给好处，多问为什么，不熟悉的人或红人给的好处轻易不要接受。

这样搞上一年，大概会是什么结果？业绩稳定在B，也就是中等水平，没人觉得玩家是明星，也没人觉得玩家是累赘。可能有轻微的胃病，近视加深，但没进ICU。学到了大厂的技术、流程、项目，一年期满，收拾东西，体面离职，游戏通关。

回头看这一年的经历，有一个问题值得琢磨：直属领导是决定玩家生死的唯一角色。

游戏的抽象逻辑是：玩家要做一个好牛马，为领导提供价值，然后获得领导的庇护，才能活下来。领导手里攥着玩家的绩效、去留、甚至健康成本。玩家一年里所有策略，本质上都是在买领导的一张“留用券”。

这种“依附代理人换生存”的逻辑，在中国历史上出现过很多次。

魏晋南北朝，农民为了活命主动依附豪强，成为“荫户”，豪强提供庇护，农民付出比国家赋税更重的剥削。北宋，失去土地的农民投靠大姓，“得田耕作”。晚明江南，自耕农扛不住赋役，选择“投献”，把自己挂在仕宦大族名下。

当系统中的底层只能通过依附中间代理人才能生存时，整个系统就开始腐烂。那三个朝代，这种依附现象大规模出现之后，无一例外走向国力衰竭、社会崩溃。因为依附结构把国家的财力和战斗力抽干了——税基被掏空，人才被锁死在内部竞争里。

放到大厂里也一样。如果领导决定下属的生死，而下属的唯一出路是哄好领导、表演忠诚，那么这家公司必然走下坡路。它会变成一个表演场，而不是一个战斗队。

有趣的是，华为的做法不一样。华为也搞末位淘汰，但淘汰的不是员工，淘汰领导。对领导实行末位淘汰，效果立刻不同。

如果玩家的任务不是待满一年，而是待满五年、十年，那最优策略会更残酷：玩家不能再满足于当一个好牛马，而必须成为领导的白手套、管家或者帮凶。

比这些策略更根本的问题是：有没有办法让这个游戏本身变得不那么恶心？

釜底抽薪的办法是：不让任何公司获得垄断地位。把市场拆开，至少两三个公司真刀真枪地竞争。竞争会逼着它们自己想办法。

可竞争市场理论说得好：重要的不是实际有几家公司，而是有没有潜在对手随时能进来。哪怕只有一家公司在运营，但只要旁边随时有对手虎视眈眈，这家公司就不敢乱来。

但这里有一个致命的锁链：竞业限制。竞业限制本来只应该约束真正掌握核心机密的高管，但现在已经完全走样。有研究显示，受到竞业限制影响的群体中，大部分是基层员工，包括保安、保洁、前台。有个的年轻人，在大厂试用期一个月，离职后被竞业一年。他自己都说：“我不理解，我能掌握什么商业秘密？”有公司把竞业名单列到三百多家关联企业，有巨头要求食堂厨师签保密协议。补偿以最低工资标准支付，违约金却高达上百万元。竞业限制一旦泛滥，就把玩家最后一条退路——跳槽——彻底焊死了。垄断让你无处可去，竞业让你想走也走不了。

从哲学上看，牛马的根本困境是：牛马的存在几乎完全由环境定义，而不是由自己定义。绩效是领导定义的，价值是岗位定义的，未来是竞业协议定义的。萨特说“存在先于本质”——人先存在，再通过自己的选择定义自己。但在大厂里，这个逻辑是倒过来的。

牛马的哲学任务，是重新夺回“定义自己”的权力。“主线任务”就是哲学层面的夺权：我不接受你给我的定义，我自己给自己编一个剧本。

牛马之间天然处于囚徒困境：内卷是个人理性下的最优解。囚徒困境有一个破解方法：重复博弈加信息透明。如果牛马之间能形成一个信息共享的网络，那么每个人在做选择时就有了更多依据。竞业限制之所以有害，正是因为它切断了重复博弈中最关键的一环。

在大厂这个生态位，牛马的最佳适应策略是“成为领导的好牛马”。这是一种高度特化的适应，特化的代价是：一旦环境变了，那些精妙的依附技巧就全废了。所以“偷偷攒真东西”和“主线任务”是在维持内在的多样性。

牛马们不需要开会、不需要组织、不需要签任何文件，只需要达成一个极其朴素的共识：我要随时保持能离开的能力，我也希望你能随时保持能离开的能力。当我们都随时能离开，这个世界才会对我们更好一点。这是这个特定博弈结构下最有效的集体行动方案。

牛马的力量不在于抱团，在于流动。最硬的底牌不是忠诚，是随时能走人。只要路没有被堵死，玩家自己会走出一条活路。

如果牛马既不能达成共识，也流动不了——竞业限制焊死了门，垄断让所有公司都一样，跳槽等于从一个坑跳进另一个更深的坑，环境会一天天恶化。最终只有一条路，朱元璋走过，他是真牛马出身，父母饿死，出家要饭，从亲兵做起，一路血战，当了皇帝。

读到这儿，脑子里很可能冒出一个念头：那干嘛还要玩那个一年期的傻叉游戏？天天哄领导、表演、攒主线任务，累死累活就为了待满一年然后跳槽？直接当朱元璋不就行了？

现代社会，朱元璋能成功不可能复制了。也许有一定概率复制孙宇晨。

孙宇晨1990年出生在青海西宁，普通家庭出身，他的核心策略跟前面讨论的“哄好领导”路径完全不同，做了三个替换：把“依附公司领导”换成“依附市场共识”；把“换个好坑”换成“自己造坑”；把“一年跳槽”换成“一步登天”，用一系列高杠杆、高曝光的操作，在极短时间内把自己推到资本和权力的中心。他的净资产保守估计在50亿至70亿美元之间。

三条核心替换，每一条都是高风险的赌注，不一定赌赢，那牛马还能做什么？又回到前面的结论，在还能流动的时候，拼命流动；在还能共享信息的时候，偷偷共享；在还能跳槽的时候，果断跳槽。
