        const TITLE = '《置身钉内》：新CEO陈宇森能挽救钉钉吗？';
        const CONTENT = `2026年6月11日，阿里巴巴宣布换帅：钉钉CEO陈航（花名“无招”）卸任，技术极客陈宇森接棒。

换帅的原因，还得从一条内网帖文说起。6月10日，阿里合伙人委员会在公司内网发帖《有情有义有成长，才是阿里文化》，措辞很严厉，直接批评钉钉团队管理方式“不是阿里文化该有的样子”。紧接着，第二天就宣布换人了。

陈宇森，1992年出生，从小就是技术达人。他免试保送进了浙江大学竺可桢学院求是科学班，在校期间加入了“蓝莲花”网络安全战队，在国内外顶级CTF比赛中拿过不少冠军。

2014年，22岁的他跟几个同伴一起创办了长亭科技，专注网络安全，先后担任总裁和CEO。

2019年，长亭科技被阿里云全资收购，保持独立运营，他继续担任CEO。

2021年7月，他离开长亭，创立了“杭州交给猫吧科技有限公司”做游戏业务，项目未能成功，持续到2023年11月。

2023年12月，他正式加入阿里巴巴集团，在CEO办公室担任研究员，为期4个月。2024年4月起，他进入阿里云，先后担任拉丁美洲总经理和全球战略合作伙伴部总经理，在墨西哥城和杭州两地办公，至今约两年多。也就是说，他在阿里体系内的真正工作时间，加起来两年半左右。

他创业出身，带过网络安全团队，做过国际化业务，又不是阿里嫡系那种层层熬上来的老人。这种履历，在阿里内部被称为“空降兵”或“半个外人”。

有传言说他在阿里云的职级是P12/M7，但从公开履历看，这个说法找不到依据。他真正进入阿里才两年半，从CEO办公室研究员起步，到阿里云区域总经理，按常规推测定级在P10/M5到P11/M6之间，最多跟无招平级。

钉钉其实是个“火坑”。一直亏损，盈利希望渺茫。外面还有两个强敌，企业微信和飞书越追越紧。谁坐这个位置，大概率都得背锅。前前任CEO叶军已经离职了。在阿里待久了的高管，谁都不想来，来了没有好处，只会背上一笔败绩。

所以，阿里的“自己人”不愿意来。那只能找个“半个外人”——陈宇森就是最合适的人选。他在阿里体系内的时间太短，没有漫长资历积累的人情债，没有要守护的内部版图，甚至没有那种“必须证明自己”的沉重包袱。也正因为他是一张清白的纸，反而能在一砚墨水里画得最潇洒。

做成了，那就是把钉钉这个庞然大物盘活，业绩不可估量；做不成，损失也不大，本来就不指望这个职位的人能善终，大不了离职走人，以他的创业经历，再起炉灶也不难，甚至阿里可能还愿意再投他一笔。知其不可而为之，并不是要人硬着头皮往火坑里跳，而是算明白了——跳下去，最坏的结果也不过是灰头土脸地爬出来，而万一成了，那就是通天之功。

阿里大概率是赌一把：陈宇森成功，阿里就赚大了；失败了，阿里也没什么损失。横竖不亏。

说实话，钉钉不可能赚钱。为什么？核心原因是没法垄断。企业微信已经率先盈利，飞书靠高付费密度也能做到年收21亿，三家混战的局面下，谁也不可能轻易让谁死掉，钉钉就很难赚大钱。

不赚钱，那阿里为什么还不放弃？因为钉钉不是赚钱工具，而是战略武器。阿里最核心的是电商，卖家需要管理内部员工，钉钉就是把这个需求牢牢黏在阿里生态里的抓手。字节做飞书、腾讯做企业微信，都是同一个逻辑。拼多多有Knock，京东有京ME，但都偏重于商家与平台沟通，而不是完整的内部员工管理——几乎所有大电商平台都在做自己的协作软件，这不是偶然。

飞书和钉钉背后的逻辑不一样。阿里早期靠“铁军”打天下，纪律严、管控狠，所以钉钉让老板用着舒服。飞书反过来，让员工用得舒服。从趋势看，让员工舒服的方向价值更大。但钉钉的基因已经长在那里了，想彻底换一套打法，不是换一个CEO就能解决的。

钉钉更像国防，每年花大钱，本身不赚钱，但没它不行。有些东西看起来没用，看着是赔钱货，但风来了才发现，那根歪木头撑着屋檐呢。

其实，钉钉这样的角色，历史上也有，比如漕运。历朝历代花巨资把南方的粮食经大运河运到北方，运输成本远高于粮食本身的价值，甚至一半烂在路上。但不运粮朝廷就得倒台。所以再亏也得运，一代一代运了几百年。钉钉就是阿里的“数字漕运”——账面上永远算不过来，但没了它，电商帝国的门槛会被蚀空。历史上那些看起来最不划算、最亏本的事情，往往藏着最深的托底。

基本上，阿里需要有人在这个位置上顶着，能撑住最好，撑不住就走人。谁能破解这个困局？恐怕没有。

话说回来，高手能让矛盾长期共存。怎么共存？明朝万历年间，吏部选官吵得不可开交，吏部尚书孙丕扬想出一个谁都无法反对的办法——抽签，让有资格的人当堂抓阄，抓到哪儿算哪儿。结果各方都闭嘴了。

有些矛盾不需要解决，只需要找一个让谁都没意见的规则，事情就能继续运转下去。钉钉现在需要的，可能就是这个。阿里的自己人不愿意来，那就从半阿里人里找；半阿里人也不愿意，那就抽签——反正钉钉固然不会赢，但也不会轻易死，抽签抽过去干几年，否则还能咋整呢？

要么硬性规定，谁想升合伙人，谁就先来钉钉干三年CEO。

不管怎样，钉钉都会在那里，像漕运一样，一代一代地运下去。

这就是钉钉最矛盾的地方——它的价值谁都看得见，但它的成功谁也说不准。它就像那条大运河，船一直在走，粮一直在运，至于什么时候能算清这笔账，恐怕没人知道。也许，永远都算不清。

那陈宇森能拯救钉钉吗？抛开情怀算一算。几种可能，概率大概是这样：

背锅走人（1~2年内离职）：概率约四到五成。内部管理矛盾爆发，或AI商业化不及预期。

平稳过渡（帮钉钉打好AI底子后功成身退）：概率约三到四成。没让局面变糟，但也没能盈利。

有限成功（在某个细分领域找到盈利突破口）：概率约一到两成。在垂直行业做出付费意愿强的AI工具。

 彻底翻盘（改变钉钉的盈利模式）：概率低于百分之五。

大概率是背锅走人，小概率平稳过渡，极小概率真的做出名堂。

这里有一个更致命的问题。阿里为什么不让一个根正苗红的阿里人来坐这个位置？说到底不敢。都知道钉钉是火坑，阿里内部前途大好的人，大概率没有一个愿意来，也不好硬摊派。一个面临真正战场却胆怯的军队，不可能获胜的？这仗还没打，气势先输一半。

陈宇森的个人成败其实没那么重要。重要的是，阿里在钉钉这个战略要地上，已经暴露了它的软弱。
