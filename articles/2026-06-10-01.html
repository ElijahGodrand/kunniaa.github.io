        const TITLE = '《置身钉内》：无招还有招吗？';
        const CONTENT = `2025年4月，无招回到钉钉，重新担任CEO。

同年8月，阿里把业务重组为四大块：中国电商集团、国际数字商业集团、云智能集团，还有一个叫“所有其他”的板块。钉钉、菜鸟、高德地图、盒马……都放进了“所有其他”。这个板块的意思很直接：不是核心业务，重要性下降了。

公司重组，肯定是遇到了问题。没问题谁愿意折腾？

那是什么问题呢？

2023年，阿里搞了一个“1+6+N”的方案，想把各个业务拆成独立的集团，各自打仗，自己挣钱自己花，哪个成熟了就上市哪个。想法不错，但做下来出了新毛病：各干各的，互相配合变差，内部消耗反而多了，力量也分散了，上市计划搁了浅。原本想解决的官僚主义、行动迟缓，没什么改观。

所以新管理层重新聚焦：阿里未来只狠抓两样——电商，以及“云+AI”。这两个核心，只需要两个人负责。其他的，都放进“所有其他”。

按照这个逻辑，钉钉的地位下降了。但它还有用——必须转向AI，配合大方向。

这个转向，在无招回来之前就已经定好了。大概率阿里跟他谈过，他认可了。他回来，主要是执行，不是另起炉灶。

那为什么非要让无招回来？原来的CEO叶军干得不好吗？

因为钉钉确实出了麻烦。

钉钉最开始是个内部创业项目，从来没想过赚钱。2015年发布后，用户猛增，亏钱也猛增。2019年第一季度，包括钉钉在内的“创新业务及其他”板块，亏了19.32亿元。2019年8月钉钉并入阿里云，继续亏。

亏成这样，谁都受不了。

2020年6月，阿里云提出“云钉一体”：钉钉做入口，客户用了钉钉，自然就用阿里云，然后给云付钱。无招不认同这个做法。2020年9月，他被调走，叶军接手。2021年7月，无招离开阿里自己创业。

叶军干得其实不错。到2025年，钉钉年营收做到了30亿，虽然还没盈利，但总算有了进账。

可是更大的问题来了：竞争对手涨得太快。

企业微信比钉钉晚发布，但靠着微信生态，月活已经做到钉钉的一半，营收跟钉钉差不多。飞书更晚，月活只有钉钉的七分之一，营收却达到了钉钉的70%。为什么？因为飞书主打AI和大模型，路子比较新。

对比下来，很容易得出一个结论：钉钉在AI上落后了，而AI和大模型才是未来。

顺着这个思路再往前推：云钉一体的方向可能确实有问题；当初不认同云钉一体的无招，可能是对的；既然他过去是对的，那未来也可能对。所以，把他请回来，打一场AI仗。

再说了，也没有更合适的人选。

内部的人不愿意接。钉钉是公认的火坑——长期亏钱，对手又快，就算做出点成绩，只要跟不上新变化，照样被换掉，履历上反而添一笔败绩。何必呢？

外部的人更不好办。空降一个CEO，光弄明白钉钉的审批流程、DING消息、已读未读这些历史遗留问题，就得半年。再加上阿里内部文化复杂，外面来的人很难融入。

所以只能找一个“曾经是内部人，现在算外部人”的——无招。他做过钉钉，懂产品、懂团队、懂阿里；他又离开四年，带回了外面的视角。两边都沾，两边都不全沾。这是唯一的解。

现在，ONE已经失败了。

但无招还有招。

他一回来就做了两手准备，同时推进两个方向完全不同的项目：ONE和悟空。

ONE的思路是“事找人”。AI当秘书，主动推送信息卡片。这个方案不改变钉钉的底层架构，只是在上面加一个AI界面。如果用户不买账——事实证明用户确实不太买账——那也只是“一个功能失败”，不影响钉钉的主体。

悟空的思路要激进得多。它要把钉钉彻底打碎，把所有的功能变成AI可以直接调用的命令行。用户用自然语言下指令，悟空这个AI代理就会自动调用钉钉的上千项能力去执行具体任务。技术难度很大，周期很长，中途可能失败。一旦失败，钉钉可能被拖垮；但如果成功，可能大幅甩开对手。

无招自己也不知道哪条路会赢。ONE更像他的理想直觉，悟空则是他的现实算计——两条路都走，对冲风险。

ONE让老板能看到员工的一切实时反馈，强提效率。说白了，就是加强管理。

悟空让老板自己就能搞定一切，不需要员工。老板对AI下指令，AI直接执行。

那么，悟空会失败吗？如果会，怎么败？

这里有几个现实问题。

大多数中小企业的数据散落在Excel表格、纸质单据、微信聊天记录里，甚至老板脑子里。悟空要求数据结构化、权限清晰、流程可以调用。数据清洗和治理的成本很大，中小企业掏不起，大企业不愿意掏。

飞书的做法跟悟空不同。飞书先把多维表格和知识库打磨好，再接入AI代理，用户没有迁移成本。悟空一上来就要打碎重来，步子太大。

AI本身有成本。AI自主执行复杂任务，消耗的算力很惊人。悟空如果搞定从数据分析到生成报告的全流程，用起来是爽，但消耗的Token可能是直接操作的几十倍。到最后，AI的办公费比人工工资还高。

还有一个更深的问题：如果悟空真的成功了，老板会突然发现，我也不需要我自己了——因为董事会也可以用AI来评估CEO的绩效，用AI代替CEO。

这就触及了更深层的人性困境。真实的企业，从来不只是效率问题。

它是由恐惧、贪婪、懒惰、虚荣驱动的。老板需要被下属仰望，员工需要被看见。

人与人之间需要信任，也需要背叛和猜忌——是的，背叛和猜忌也需要，因为人要通过这些来确认自己是谁，确认什么是“我”，什么是“不是我”。

我为了这口醋包的饺子。嘉靖需要严嵩，需要赵贞吉，也需要胡宗宪。

ONE和悟空都在解决效率问题，一个偏向整体化，一个偏向碎片化，两种风险互相对冲。但它们都没有处理人性问题。也许无招自己心里没有这个东西，也许他觉得老板们不需要这个东西。

但问题是，老板们真的不需要吗？

回到最初那个问题：无招还有招吗？

有的。悟空就是他现在的招。这一招能不能成，不光看技术和成本，还要看它打算怎么对待人——那些不想被AI完全替代，也不想完全替代别人的人。

这才是真正的难题。`;
        // ═══════════════════════════════════════

        const contentDiv = document.getElementById('article-content');

            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
