    <script>
        // ═══════════════════════════════════════=

        const TITLE = '大模型 | 正在整理最近三年AI大模型Agent面试题合集';
        const CONTENT = `今天在整理AI大模型Agent面试题合计，包括抖音，字节，腾讯，淘宝，百度，Minimax，百度，OpenAI，小红书，得物，阅文，商汤，京东，快手，阶跃，千问，虾皮，Soul，滴滴，哈啰，美团，智慧树等大中小厂，时间范围从2024年1月到2026年5月，共计79套104轮。

明天放到我的星球。
  
一个Agent岗，年包40W到120W之间，差别在于经验，以及你有没有见过那些不按常理出牌的真题。

...

https://www.kunniaa.com`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
    </script>
