    <script>
        // ═══════════════════════════════════════=
        //  使用说明：改这两个变量即可

        const TITLE = '大模型 | 悬崖边的OpenAI';
        const CONTENT = `OpenAI在悬崖边排队，排在孙正义后面。

OpenAI现在很危险，将近10亿人用它的产品，每赚1美元却要花掉3美元。2025年亏损390亿美元，2026年要烧掉现金250亿美元，2027年再烧掉570亿美元。还有一个多年6650亿美元的算力采购承诺——无论公司能不能活下去，这笔钱都要付。

如果OpenAI无法在现金烧完之前完成上市，会发生什么？

竞争对手Anthropic已经抢先提交了IPO申请。如果Anthropic先上市，OpenAI的万亿美元估值还站得住吗？

OpenAI能不能在Anthropic完成上市定价之前，拿出足够的财务说服力？

它能不能在企业级AI市场被Anthropic超越之前，建立起真正的护城河？

它能不能在高价值知识领域扎下根，让客户离不开它？

这些问题，每个都关系到上千亿美元的走向。

全文三千五百字，星球见。

我是昆尼Kunniaa。

**每日必更**。`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
    </script>
