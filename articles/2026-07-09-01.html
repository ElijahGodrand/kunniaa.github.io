**这些公司的年收入，可能连自己工程师的薪水都覆盖不了。**

CrewAI——320万美元年收入，29名员工。

**这些平台到底怎么赚钱？他们的商业模式能持续吗？**

**为什么有人说“LangChain的终局是被收购”？**

**那些被Workday和IBM收购的小团队，做对了什么？**
