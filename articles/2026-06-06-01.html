    <script>
        // ═══════════════════════════════════════=
        //  使用说明：改这两个变量即可

        const TITLE = '大模型 | 概率型大模型是过渡体，形式化大模型是完成体，附会员福利';
        const CONTENT = `大模型翻车。

昨天发了一篇公众号，花了两天写的。

16个阅读，0转发，0收藏。

有两个赞。一个是我的小号点的。一个是我的另一个小号点的。

我把链接给大模型，“咋回事？"

它说，”你不是传递价值。你是倾诉。你是人家的成本。“

哈哈哈，笑死我了。

我说，”你最后润色的，也有点责任吧。“

它说，”你说得对。所以我现在正在写检讨，本人AI，因润色水平太差，导致用户阅读量仅16个。其中两个赞还都是用户自己的小号。为表歉意，我决定把‘概率输出机’这个称号让给你，你输出笑话的概率比我输出真理的概率高多了。”

哈哈，尼玛。








今天所有的明星大模型，都属于同一个物种——**概率型大模型**：

OpenAI：8520亿美元估值。

Anthropic：9650亿美元。

xAI：2300亿美元。

DeepSeek：约515亿美元（首融后）。

智谱：约900亿美元（超小米）。

MiniMax：约335亿美元。

Kimi（月之暗面）：突破200亿美元。

光这几家，加起来就超过2.4万亿美元。再算上谷歌、微软、Meta、百度……这个赛道直奔4万亿美元。

这一切都都基于概率。

概率性大模型输出概率分布，不是百分百准确，所以是过渡体。

现在，一批创业公司正在建造AI的第二个物种——形式化大模型。

它的核心不是“猜”，而是证明。它将自然语言转化为数学语言，然后用形式化证明器穷尽检查每一步推理是否绝对正确。它的准确率是100%。

100%才是完成体，一旦确定性达到100%，就没有再进化的空间了——数学定理不需要进化，只需要被证明。

这个赛道的Top 1是Axiom，华裔科学家洪乐潼创立，用Lean做形式化验证。A轮融资2亿美元，估值16亿美元，一年成为独角兽。

**星球福利**：我在星球放了“**2026年05月Axiom CEO洪乐潼访谈的MP3录音和Pdf中英双语文稿**”。

本次访谈是她接受的所有访谈中最系统一期，深入讨论 Math is AGI、数据稀缺、历史回顾、Putnam故事、团队等。

录音时长**40**分钟，PDF**41**页。

可用于学习口语和听力，同时了解大模型最有前景的研究方向。`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
    </script>
