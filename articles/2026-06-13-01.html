        const TITLE = '十个穷人和一个富人-海边的主权决断';
        const CONTENT = `很久以前，海边有一块土地，住着两拨人。

一拨只有一个富人。他不知从哪里学来了几门手艺——会造一种能飞上天的滑翔翼，会调一种抹了皮肤不干不裂的神奇面霜，还会用一种特殊的魔法石头做灯，比油灯亮十倍。

另一拨有十个穷人。他们什么都不会，只会种地、打鱼、砍柴。穷得很，衣衫褴褛，连双像样的鞋都穿不上。

富人把滑翔翼摆在村口，对穷人说：想飞上天看看风景吗？租一次，交两条鱼。穷人没见过世面，觉得新鲜，纷纷去租。他又拿出面霜：想皮肤光滑吗？一罐换五筐鱼。穷人干活晒得皮肤皲裂，咬牙也买。

最狠的是魔法石头灯。穷人晚上摸黑干活，效率极低。富人的灯一亮，整个村子亮如白昼。穷人想要？可以，每天交一筐鱼。

于是，十个穷人每天从早到晚拼命干活——种地、打鱼、挖石头——然后把大部分收成交给富人，换回滑翔翼的使用权、一罐面霜、一盏灯。

富人什么都不用干，躺在藤椅上，鱼吃不完，烂在仓库。穷人的孩子饿得面黄肌瘦，富人还嫌他们干活太慢。

这样的日子，过了好几十年。

穷人里有个年轻人，脑子活泛。他仔细看了看富人出租的滑翔翼，用手比划比划尺寸。他不识字，但他会画图，把做滑翔翼的步骤画在树叶上，传给其他穷人。

他又尝了尝买的面霜，猜里面加了什么。

十年过去了。穷人真的造出了一架滑翔翼。虽然飞得不如富人的高，翼面没富人的结实，但能飞。成本只要三条小鱼。

穷人还调出了一种面霜。抹上去虽然不如富人的香，但也能防皲裂。成本只有富人面霜的十分之一。

穷人开始不租富人的滑翔翼了，也不买富人的面霜了。他们用自己造的东西。

富人的鱼收入一下子少了一半。他慌了。

富人躺在藤椅上想了三天三夜。他意识到，穷人的学习能力比他想象的要强，得换个法子。

这一天，富人主动找到穷人，满脸堆笑：“兄弟们，我看你们日子过得苦，这样吧，我借给你们一笔钱。利息很低，只要每年给我一点点鱼就行。你们可以用这笔钱去买木头、买绳子、买石头，扩大生产。”

穷人觉得奇怪——这个吸血鬼怎么突然变了？但转念一想，利息确实很低，比高利贷低多了。于是借了。

穷人不知道的是，富人借出的鱼，不是白花花的活鱼，而是只能从富人店里买东西的“鱼票”。穷人拿着鱼票去买木头，发现村口唯一卖木头的店，就是富人的。富人的木头价格，比外面贵一倍。

而且，富人在借鱼的时候，悄悄加了一条：“你们用这笔钱建的工坊，以后生产的滑翔翼，核心技术要用我家提供的图纸。图纸不收费，但每次生产，都要给我交一笔‘图纸使用费’。”

穷人算了算，利息是低了，但木头贵了，图纸使用费也是钱。七扣八扣，自己辛辛苦苦干活，最后落到手里的，和以前差不多。

这招叫低息捆绑。表面上帮你，实际上把你的利润通过另一条渠道收走了。穷人干活更累了，富人的藤椅摇得更欢了。

又过了些年，穷人的手艺越来越精，自己造的滑翔翼质量快赶上富人的了。富人急了，又想了一招。

他把穷人叫来：“我看你们自己造滑翔翼挺辛苦的，不如这样，我把全套的‘滑翔翼生产线’卖给你们。设备、图纸、甚至怎么培训工人，我都包了。你们付一次钱，以后自己就能批量生产，多好。”

穷人觉得有道理。虽然价格不菲，要交出三年的鱼获，但能一步到位拥有富人的技术，值了。

于是穷人砸锅卖铁，买下了富人的生产线。设备运来了，图纸堆了半屋子，富人手把手教穷人怎么操作。

但穷人很快发现一个问题：生产线里最核心的那个部件——控制滑翔翼平衡的“陀螺仪”——坏了不能修，只能找富人买新的。一个陀螺仪，要价半年的鱼获。

而且，图纸上只有“使用说明”，没有“制造说明”。也就是说，你会用这台机器，但永远不会自己造一台一样的。

最值钱的东西——那个知道‘为什么这样设计’的东西——留在富人那里，叫母工厂。

穷人买到的，是一具没有灵魂的躯壳。

穷人的滑翔翼越造越好，甚至开始卖到海对岸去了。富人一看，又一条财路要被人抢了。

他想了个新主意：搞品牌。

富人找到穷人：“这样吧，你们生产的滑翔翼，别用你们自己的牌子了。你们给我代工，生产出来的东西贴上我家的‘飞丸’牌，我帮你们卖到更远的地方去。卖一个，你们赚一条鱼。”

穷人算了算，自己卖一个滑翔翼能赚三条鱼，但只能卖到附近的村子。交给富人贴牌，富人能把价格翻三倍，卖到千里之外的大市场。虽然自己只分到一条鱼，但量大，算下来总收入差不多。

于是穷人答应了。

但穷人没意识到的是，富人每卖一个赚十条鱼，富人的“飞丸”牌越做越响，所有人都认这个牌子。过几年，穷人想自己用原来的牌子卖滑翔翼，已经没人买了——大家只认“飞丸”。穷人彻底变成了富人的“加工车间”，只能赚个辛苦费。

富人甚至还发明了一套理论，叫什么“羊行方阵”——他说，富人是头羊，穷人们是后面的羊。头羊走多远，后面的羊就走多远。听起来很美。但实际上，头羊永远在最前面，后面的羊永远在后面。这是设计好的等级。

穷人里有个聪明人，发明了一种“电影放映机”，能放出会动的画面。穷人们都爱看。

富人眼红了。他回家翻了翻自己的旧抽屉，发现二十年前他申请过一个“放映机传动结构”的专利——原来电影放映机的核心传动原理，富人早就注册了。当时他嫌这个发明不赚钱，丢在抽屉里吃灰。现在穷人的放映机卖火了，富人笑了。

富人宣布：凡是要造电影放映机的人，每造一台，必须给他交十块钱的专利费。

穷人算了一笔账：自己辛辛苦苦造一台放映机，卖出去只能赚一块钱。富人的专利费要十块钱，这下就不赚钱了，还要倒贴好多。

穷人炸了。但没办法，专利是富人几十年前申请的，法律认。

更恶心的是，富人这套操作是有预谋的。他在穷人刚开始造放映机的时候，一声不吭，甚至鼓励穷人快点造、多造。等穷人建了几百家工厂，产能冲到第一的时候，富人突然掏出专利合同，一纸诉状寄到穷人门口。这叫“放水养鱼，养肥了再杀”。

穷人的几百家放映机工厂，一夜之间倒闭了一大半。剩下的，每台利润一块钱，交完十块钱专利费，亏得裤子都当了。

富人躺在藤椅上数钱，一台机器赚十块钱，啥活没干。穷人蹲在工厂门口哭。

又过了很多年。穷人靠着自己的苦干，居然在一些领域超过了富人——尤其是在处理那种“魔法石头”的工艺上，穷人的手艺独步天下，富人反而要来找穷人买石头。

富人心里不是滋味。他想了一个阴招。

他派人悄悄到穷人村里，开出十倍的高薪，把穷人村里几个最懂处理魔法石头的工程师挖到了自己家。名义上叫“技术交流”，实际上让这些工程师手把手教富人怎么冶炼、怎么提纯。

穷人这边还蒙在鼓里，以为真是“合作交流”。等到发觉的时候，富人的魔法石头加工能力已经悄悄追了上来。

这叫“偷师”。富人嘴上喊“保护知识产权”，背地里偷起别人的技术来，一点都不客气。

穷人越做越大，富人的滑翔翼、面霜、放映机都卖不动了。富人彻底慌了。

不是因为穷人做错了什么，而是因为穷人太大了，再这么发展下去，以后这海边谁说了算就不一定了。

富人想了想，虽然自己每年卖给穷人的设备能换来堆积如山的鱼，但长远看，如果穷人造出了比他还好的东西，他就彻底没活路了。

富人说：二十三种高端设备，禁止卖给穷人。

富人的算盘是：卡住穷人的脖子，让你跑不快。

但他忘了一件事。

穷人接到禁运通知的那天，没有哭。他们回到自己的工坊，翻出过去几十年的笔记、画下的图纸、拆过的零件，开始自己造那些被禁运的设备。

一年，两年，三年。

穷人宣布：富人不卖给我们的那种“魔法石头灯核心机床”，我们自己造出来了。虽然精度还差一丢丢，但能用。而且，我们还在加速迭代。

更让富人没想到的是，穷人手里捏着富人的命根子——魔法石头。

那种特殊的魔法石头，全海边只在一个地方出产——穷人村后面那座山。以前穷人不知道这石头的价值，一筐一筐卖给富人，只换几条鱼。现在穷人知道了：没有这种石头，富人的滑翔翼飞不起来，富人的灯亮不了，富人最引以为傲的高端技术成了一堆废铁。

穷人做了一个决定：不卖了。

不是涨价，是根本不卖了。

消息传到富人，富人的滑翔翼工厂停产了，因为缺了一种关键材料——这东西必须用穷人的魔法石头才能提炼。

富人的股市，一夜之间跌得比过山车还猛。

穷人的滑翔翼越造越好，放映机也绕开了专利，面霜更是物美价廉。按说日子就该这么过下去了——你造你的，我造我的，谁的东西好大家就买谁的。

可事情没那么简单。

因为穷人和富人之间，不是没有过节。

很久以前，富人不只是在村口出租滑翔翼、卖面霜。他曾经带着一队人，闯进穷人的村子，抢走了穷人最好的土地，烧了穷人的房子，杀了穷人的老人和孩子。他把穷人的女人抓去当佣人，把穷人的孩子绑去当学徒——不是教手艺，是当牛做马。那段日子，穷人的眼泪流成了一条河。

后来穷人拼了命把富人赶走了，但伤口还在。那些被烧毁的房屋，废墟上长了草，但草根下面还是焦土。那些被杀死的亲人，名字刻在石碑上，每年清明穷人还要去烧纸。

富人知道，比谁都清楚。

他想起自己当年在穷人村里干过的事。他想起那些被他扔过石头的屋顶，那些被他抢走粮食的老人，那些跪在地上求他手下留情的女人。他知道，如果穷人有一天翻了身，他的下场好不到哪里去。

富人躺在藤椅上，翻来覆去睡不着，想出了一个毒计。

搅乱穷人的脑子。让他们忘记过去的事，让他们觉得富人其实挺好的，让他们自己人跟自己人吵起来。

于是，富人开始了他最阴险、最持久、也最难以察觉的进攻——洗脑。

他要用电影、音乐、动画，把穷人的记忆一点点抹掉，把穷人的仇恨一点点稀释，把穷人的团结一点点拆散。

他要让穷人的孩子从小就觉得富人的东西高级、富人的文化迷人、富人的历史“没那么坏”。他要让一部分穷人开始同情富人，甚至替富人说话。

富人的电影厂拍了一部片子，讲的是“飞天英雄”的故事。

这个“英雄”，其实一点也不英雄——他造了一种叫“零式”的大鸟，专门飞到穷人村里扔石头、烧房子。当年，这种大鸟在穷人村里投下了无数的苦难，多少穷人家庭的屋顶被掀翻，多少穷人的孩子失去了父母。

但富人的电影怎么拍的呢？

电影里没有穷人被欺负的画面，没有一个穷人掉眼泪的镜头。它拍的是：这个“英雄”小时候是个追梦的少年，看着天上的鸟就想飞；他废寝忘食地画图纸、做模型，遇到挫折也不放弃；他最大的梦想就是造出一架“最美的大鸟”——不是用来扔石头的，而是“一个美丽的梦”。

电影上映后，一片叫好。但被欺负过的穷人村里，有人看不下去了。一位穷人说，这部电影用温情给战争罪犯洗白，令人不适。还有穷人公开批评，这部影片拒绝承认富人在造成这种可怕结果中所扮演的角色——很不道德，因为它掩盖了制造这些大鸟的真实目的。

可是，可怕的不是富人拍这种片子——可怕的是，竟有一部分穷人，看完后流下了感动的眼泪。他们觉得那个“追梦少年”好可怜，觉得战争只是“风吹过去了”，觉得富人也没做错什么。

他们在富人的电影院里哭富人的“英雄”，却忘了自己家祖坟上那块被富人石头砸出来的坑，至今还没有填平。

没多久，富人又唱了一首歌叫《星》。旋律优美，歌词伤感，唱的是——

“闭上眼睛，一片遐想，星光洒向四方，照亮我一路前行……”

这首歌是怎么写出来的呢？富人说，他小时候一闭上眼就能看到一个景象——草原延伸到地平线，满天的星星闪耀着，风吹过来。他在地图上寻找这个地方，冥冥之中觉得这就是穷人家的北方。

后来这首歌在穷人村里火得一塌糊涂。每次演唱会，穷人们都跟着合唱，有人听得热泪盈眶。富人跑到穷人村演出，穷人们挥舞着荧光棒，跟他一起唱“星啊星，照亮我前行”。

听起来很美，对不对？

富人靠“想象”写出的歌，却让成千上万的穷人陶醉其中、泪流满面。但仔细想想，把富人想象前推十年，正是他带着帮凶骑着马、扛着刀，来穷人村里掠夺那片土地的时间，就是这首歌所唱的那片土地——那个满天繁星的夜空，那片广阔无垠的平原。

电影、音乐还不够。富人的动画片、漫画也铺天盖地地涌进了穷人村——《宝的梦》《哆嗦C梦》——穷人村的孩子从小就看这些东西长大，对富人抱着盲目好感，甚至在内心深处偷偷觉得富人什么都好，自己的东西土得掉渣。

富人把“侵略”改成了“进出”，把“大屠杀”换成了“事件”，把杀人犯改成了“殉难者”。他还说“大屠杀是穷人编造的谎言”。

这些招数管不管用？

管用。相当管用。

现在在穷人村里，有一部分年轻人——甚至一些上了年纪的人——已经开始替富人说话了。

“人家富人当年也帮过我们嘛。”他们看着富人那些精美的动画片、听着温柔的歌曲，逐渐忘记了自己爷爷辈被富人用石头砸破过脑袋。有的穷人甚至开始公开表示——富人给的贷款帮穷人修了路，穷人的厂子里用的是富人的图纸，穷人的饭桌上摆着富人的酱油，替富人喊冤鸣不平。

有些穷人的孩子看完电影，回家对爷爷说：“爷爷，那个造大鸟的人好可怜哦，他的梦想被人骂了呢。”爷爷张了张嘴，想说什么，又咽了回去。他想说：孩子，那只大鸟扔下来的石头，就砸在你太爷爷的头上。可他看着孩子亮晶晶的眼睛——那双被富人的动画片喂大的眼睛——他知道，他说什么都没有用了。

有什么用呢？一个穷人的孩子，从小看富人的动画片长大的，跟他讲“渗透”两个字，他听不懂，他甚至觉得你在骂人。

一个富人在穷人村的大城市开演唱会，唱了一首《星》，全场数万人齐声合唱，场面比穷人过年还热闹。唱到最后，歌星深情地说：“我上辈子就是你们穷人。”

全场掌声雷动，穷人热泪盈眶。

——可那旋律背后，那片被唱得凄美动人的“故乡土地”，却是富人曾经用刀凌虐过的土地。那片土地上，穷人们流过的血，可能比今天演唱会的观众席上流下的眼泪还多。

富人手里，曾经有十几张牌。现在都被穷人一张一张掀翻了。

滑翔翼，穷人自己会造了。面霜，穷人自己会调了。放映机，穷人的专利过期了，自己搞了新标准。魔法石头灯，穷人连石头都不卖了。

富人翻遍了家里的柜子，发现还剩三样东西——这三样，是他最值钱、最赚钱、最要命的家当。

第一样，叫“智慧芯”。就是滑翔翼的大脑，也是魔法石头灯的控制核心。没有这个东西，再好的滑翔翼也飞不稳，再亮的灯也亮不起来。

第二样，叫“万向珠”。就是滑翔翼关节里那些比米粒还小的小珠子。滑翔翼要转弯、要俯冲、要平稳，全靠这些小珠子。

第三样，叫“母机床”。就是造滑翔翼的“机器的机器”。没有它，滑翔翼的骨架造不出来。富人造的母机床，精度高得吓人，穷人做梦都想有一台。

这三样东西，是富人最后的命根子。他靠这三样，每年能从穷人手里收走堆积如山的鱼。穷人买一台智慧芯，要交一百筐鱼；买一颗万向珠，要交一筐鱼；买一台母机床，穷人得把半个村子的鱼都交出来。

能不心疼吗？

穷人村的东头，有一家东硅工坊。老板是个中年人，早年去富人家看过他们的智慧芯生产线，回来后就发誓要自己造。现在，徒弟问他：“师傅，咱们跟富人的逆越工坊还差多少？”他想了想说：“差得不多了。再给我五年。”

富人听到这句话，手里的茶杯掉在了地上。

穷人村的西边，有家西丰工坊。他们专做一种叫“靶材”的东西，纯度做六个9，最挑剔的客户都开始下单了。

穷人村的北边，有家铁远工坊，搞出了一条全自动小珠子生产线。机器轰鸣，一天产出几万颗，他说：“富人的产线没什么了不起，不就是干得早吗？我们干得晚，但跑得更快。”

穷人村的南边有“母机床”基地，虽然精度还差那么一丝丝，胜在性价比高，价格只有富人的三分之一。穷人的朋友也很穷，买不起富人的，都跑来买穷人的。

当穷人把这些东西一样一样造出来的时候，富人发现了一件可怕的事——他手里那三张最值钱的牌，正在一张一张地被抽走。

富人苦笑了。他抬起头，望着窗外。远处穷人村的灯火，比富人村亮得多、热闹得多。他听见隐约传来的机器轰鸣声，那是穷人工坊里彻夜不停的生产线。他知道，那些轰鸣声里，有他曾经最引以为傲的技术，有他曾经用来控制穷人的专利，有他曾经以为永远不会被攻破的壁垒。

他想起三十年前，他第一次借给穷人低息贷款的时候，他说：“这些穷人，一辈子都得靠我。”

现在，保险柜还在，锁还在，但里面已经空了。

富人花了上百年，发明了四套本事——

第一套，叫做“分而治之”，让穷人自己打自己，他在旁边卖武器。
第二套，叫做“放贷收割”，借钱给穷人，绑住穷人几十年，从穷人身上一点点掏回来。
第三套，叫做“专利陷阱”，先养肥，再一刀杀。
第四套，叫做“文化洗脑”，让穷人的孩子崇拜他，让穷人同情他，让穷人的子孙忘记他干过的脏事。

富人躺在藤椅上，手边堆着老掉牙的专利证书、发霉的贷款合同，墙上还贴着那张老电影的海报——“零式的梦”。他翻了个身，望着远处穷人村的灯火，那里比富人村亮得多、热闹得多。

他一直以为自己在操控穷人。可他忘了，穷人的孩子虽然爱看他的动画片，但穷人孩子的课本里，也有一页写着：“落后就要挨打。”

当他发现自己控制穷人的所有工具都不灵了——市场被穷人占了，供应链被穷人卡了，连他家最值钱的滑翔翼生产线，都被穷人拆了个精光——他就该明白了。

这场游戏，穷人从一开始就不只是“十个人”那么简单。他们是十个人，十双手，和十颗被历史磨硬了的心。`;
