        const TITLE = '大模型 | 人均融资6000万，最接近造物主的项目。';
        const CONTENT = `大模型本质上是一个概率预测引擎。

它的一切输出，都是文字接龙，看到你的提问，去计算接下来最可能出现的词是什么，然后输出这些词。

这个简单原则让它非常成功，改变了编程、设计、绘画、摄影、音乐等等很多行业。

但这个本质让大模型有缺点：它不知道什么是事实，什么是逻辑。

所以有幻觉。

所以不能做高精度运算和逻辑推理。

那也就做不了数学证明、智能合约安全验证、芯片设计规则检查、航天航空控制、医疗设备控制。这些要是出事了，损失巨大。

幻觉有多搞笑？

以前有人问大模型《水浒传》中李逵为什么要大闹五台山？

当时的主流大模型都没发现问题本身是错的：是鲁智深大闹五台山，不是李逵，都煞有其是编造出李逵“喝醉酒”“误闯寺庙”的情节。

大模型生成的旅游攻略，描述的景点实际上不存在。

修改学术论文，编造不存在的参考文献。

分析财报，编造不存在的财务数字和利润数据。

编写的代码删除完整生产数据库，几乎把公司搞破产。

这是概率预测引擎的必然结果，只要是概率预测，就无法避免这些事。即使增加可控性与对齐、安全与伦理等功能，也只能减少概率，不能避免。

那能不能做到既百分百的确定性？如果做到了，有多少大价值？

大模型作为概率引擎，已经创造天量财富：OpenAI估值八千亿刀；Anthropic估值九千亿刀。

百分百确定，估值能到多少？应该它们差不多吧？即使打个五折，那也有四千亿刀。

有这样的创业公司吗？

有的，兄弟有的。

创业公司Axiom，这个方向的第一名，做AI形式化证明，只要形式化证明是对，结论就是百分百。

2024年8月成立，团队2人，种子轮融了960万刀，2026年03月，团队20人，A轮融了2亿刀。人均融资额一千万刀，6000多万人民币。现在估值14亿刀，距离4000亿刀还远。

Axiom做的东西是这样的：用大模型猜问题的解决步骤；把猜测的步骤翻译成形式化数学语言Lean，做形式化证明；如果证明通过，那结论必然100%正确，这是Lean保证的；如果证明不通过，让大模型重新猜，重新验证；循环，直到成功。

简单吧？

简单！

但创造了奇迹。

Axiom在普特南竞赛拿了满分，这是北美最难大学生数学竞赛，十二道高难度试题，近百年仅5位人类达成。

在无人干预下证明悬置20年的数论猜想。

连续攻克4道未解数学难题，包括Chen–Gendron猜想和费尔猜想。

非常酷炫，但并不是高不可攀，它是可理解可复制的。

Axiom无人干预下解出了埃尔德什问Erdos题集的第124题和第481题，说明它擅长解决数学家懒得解、但各行各业都需要解的繁琐验证问题。

第124题有两个版本，一个简化版本，另一个增强版本。Axiom实际解决的是简化版。从回看的角度，其解法的核心思路其实非常简单，顶尖数学家陶哲轩评价它主要是因为存在一个技术性漏洞才变得简单，本质属于“低垂的果实”。

第481题，解法45年前就有了，后来数学家又给出了一个更通用的证明。Axiom独立给出了一个漂亮的新解法并完成验证，但本质上和45年前的解法大同小异。

这不是不好，这反而提升了Axiom的商业价值，代替数学家做繁琐的证明工作。

就像Axiom求解普特南数学竞赛A5题。这道是组合题，组合一直是AI的软肋。人类解这种题依赖顿悟。Axiom把顿悟拆解成形式化逻辑，枚举所有可能的推理路径，逐个验证。最终答案，Lean代码2054行，每一行都经过形式化证明，绝对无漏洞。人类永远不会这么写，但它可以。

用Lean验证一个数学定理、一段安全协议、一份金融合约，数学家先理解要验证的内容，再手动翻译成Lean代码，反复调试，直到通过。

这个过程极度耗时，一个中等难度的问题，数学家需要几周甚至几个月解决，极度枯燥，要完成大量琐碎的步骤填充，且人才极度稀缺，同时懂领域知识，金融、密码学、合约和Lean的人，全球可能只有几百个。

所以，即使在航天、芯片、金融这些关键领域，形式化证明也只在极少数场景比如飞机飞控、芯片设计使用。

高科技领域对形式化证明有巨大需求。

物理学领域，四维时空自由玻色量子场论在Lean中完全形式化；形式化了广义量子斯坦引理，并修正了原论文；杨-米尔斯存在性与质量缺口与著名“千禧年大奖难题”相关的证明已在Lean中实现。

化学领域，用定理证明器验证了化学模型的动态特性，为反应器安全性提供了数学保证；用定理证明器验证新药物分子合成路线的可行性；形式化证明用于分析从酶促反应到基因调控的各类生物化学网络。

生物学领域，用定理证明器进行形式化证明精准医疗；构建布尔网络等计算模型；

人文社科领域，用Lean验证了包括阿罗不可能定理、投票方法的孔多塞一致性等社会选择理论中的多种结论；用Lean形式化了博弈论，证明了第二价格拍卖中，真实报价占优策略。

当你终于写出了一段被Lean完整验证通过的证明时，你触碰到了某种超越个人主观的、绝对的、机械可检查的公理。那一刻，你是被造物主允许通过的朝圣者。

那Axiom是可复刻的吗？

有整套复刻方案，包括技术路线、商业模式、多退出策略、竞对分析。感兴趣的朋友可以到我主页和星球阅读。

联合创始人数学家Ken Ono，洪乐潼的老师，先后获得古根海姆奖、斯隆奖等顶尖荣誉的数学领域权威、前美国数学学会副会长，辞去弗吉尼亚大学的终身教职，全职加入 Axiom。

Axiom的CTO是前Meta AI研究总监Shubho Sengupta。

这个团队过去的成就足以验证其能力，在只有想法没有产品的情况下就能获得960万种子轮投资。

别人不行。

复刻要从零开始，四个阶段。

第一阶段，3~6个月，学习Lean 4，这对天赋是有一点小要求的，至少要有数学分析和高等代数基础。边学边营销，在某乎、GitHub、技术社区分享Lean学习笔记和教程，把自己打造成Lean社区的KOL。国内懂Lean的人极少，高质量技术分享能让积累信任背书。

搭建环境，跑通第一个证明，学习《Glimpse of Lean》、《Theorem Proving in Lean 4》，确保独立完成大部分课后习题，这非常重要。深入研读《Mathematics in Lean》和社区大型项目源码，项目实战，独立解决问题。

这个阶段会有各种工作机会找上门，会Lean和形式化证明的太少了，很多公司会寻求合作。

在这阶段退出创业去工作，全职月薪大概10~30k左右。

第二阶段，3~6个月，在特定小领域做一个最小可行产品MVP（Minimum Viable Product），找客户，卖服务，赚钱，跑通商业流程。比如智能合约形式化证明。

全球智能合约审计市场规模已超15亿美元，年增长率超40%。

可以给DeFi协议做关键模块验证、给跨链桥做协议级验证、给ZKP硬件做形式化证明。市场需求多，客户付费意愿强。

MVP使用AI证明器模型 (Prover Model)和Lean验证器实现。

AI证明器模型 (Prover Model)是专门用来生成证明代码的大模型，比如Mistral Leanstral（1200亿参数，激活参数仅60亿）和 某节 BFS-Prover-V2-7B（76亿参数）。Lean验证器 (The Verifier)负责最终检查所有证明的正确性。

比如做一个 ERC-20 形式化证明的MVP，验证核心功能transferFrom函数，这是整个 ERC-20 标准中最容易出错的地方。

要证明：在 (spender, owner, recipient, value) 这个输入场景下，只要前置条件满足（比如owner余额足够、spender授权足够），代码执行后，owner的余额必定减少 value，recipient的余额必定增加value，并且spender的授权额度也相应减少。

大致流程是这样的：

用Verity把要验证的智能合约的Solidity代码逐行翻译成Verity的合约DSL，陈述并证明关键的安全属性。

然后调用 Leanstral 生成 Lean 代码：“请帮我用 Lean 4 编写一个函数transferFrom_spec，它的输入是一个 Ledger（账本）、spender、owner、recipient和value，并输出一个新的Ledger。请将函数的实现限制在那些只会修改balances和allowances映射的语句上，并包括我在自然语言中描述的那些前置条件和后置条件。”

 Leanstral自动生成证明骨架。

根据Lean提供的目标和上下文信息，使用rw（重写）、simp（简化）等策略完成证明。

验证过程本质是循环的：提交证明 -> 编译器报错 -> 阅读 \`Lean infoview\` 中的错误信息 -> 修正。对于复杂的证明，可能需要多次循环。

通过 Lean 验证后，生成一份专业的审计报告作为 MVP 的最终交付物。

MVP跑通，还可以把服务拓展到芯片EDA验证、金融合规风控、工业机器人运动控制验证、自动驾驶规约验证、高端装备核心控制系统验证。

商业化的过程，要收集调试Lean大模型时遇到的所有典型错误及其解决方案知识库，建立垂直领域Agent，形成闭环验证的编排层。打造特定场景下自动化验证工具链，跑通闭环，能稳定产出验证报告的专用工具，比一个通用的、只会生成代码的大模型API要值钱得多。证明了对垂直场景的深刻理解和工程化能力。

这个阶段收入比较可观。跑通商业流程，跨入专家级别。如果这阶段退出创业去找工作，年薪50w到300w。

第三阶段，训练自主产权的Lean大模型，6~12月。用前两个阶段积累的数据，包括智能合约审计逻辑、芯片验证规则、金融风控模型，具身智能，转写成Lean的公理和规则集，构建私有训练数据集。选择一个像Leanstral这样7B/13B规模的开源模型作为基础，用私有训练数据集监督微调（SFT），训练自主产权的Lean大模型，在特定场景下快速建立优势，并深度服务客户。

如果能拉到高端人才、资金，可以复刻Axiom的通用方案。

Axiom的工作流是一个严格的四步验证环路。

首先是规则优先定义。先定义所有系统必须遵守的规则，最底层是不可变设计原则；中间层描述算法约束；顶层则是记录历史决策，仅作参考。

然后是形式化编码阶段，将上一步自然语言规则转化为机器可读的数学逻辑。同时，必须将待验证的AI输出内容翻译成数学证明Lean语言，这是后续所有验证的基础。

第三步是核心的异构协同验证。大语言模型负责生成猜想和搜索可能的证明策略，Lean语言驱动的形式化证明引擎，对推理的每一步进行严格的数学检验。这一步骤会动用多种工具，包括Z3求解器寻找违反规则的反例，并通过通用验收管道（UAP）进行自动化的反例修复和迭代验证。

最后是证明固化与输出。当一个输出被证明为安全后，整个验证过程（包括具体的查询条件、生成的Lean证明等）都会被完整记录在证明库中，确保整个验证过程是确定性和可重现的。最终输出的是一份完整的、经过计算机严格验证的形式化证明。

这个环路的关键机制是验证数据飞轮。每次成功验证后，都会将检验通过的证明数据和反例数据全部回收，形成一个庞大的、机器可读的已验证数据集。这些高质量的数据会直接用于训练下一代AI模型，并且由于其来源是已经被证实的定理，因此能在提升模型能力的同时，避免因在低质量数据上训练而导致的模型崩溃。

在这个阶段，你必须既懂形式化语言Lean，又懂大模型训练，否则很难说服客户。客户来做技术尽调，会问得非常细：你们的模型架构是什么样的？训练数据怎么构建的？Lean证明的自动化率是多少？如果不是你回答这些问题，只坐在旁边点头，客户会觉得这个公司真正的价值在研发人员身上，不是在你身上。

Lean能力要达到能独立完成中等难度证明的水平，能够看懂和修改团队生成的Lean代码，能够判断一个技术方案的可行性，并且能够在关键时刻亲自下场解决核心难题。

能从零写Transformer，清楚数据准备、微调、部署的每个环节，能够亲自跑通一个最小闭环。知道一张4090或者H100能干什么不能干什么，知道训练成本怎么估算，知道模型出问题时该从哪里开始排查。

能够亲自带出第一支技术团队。早期招人时，你要能面试技术候选人，能判断对方的真实水平。

科技公司PS一般在10~20之间。一年净利润100万，公司的估值就是1000万~2000万。

在这个阶段，钱不是问题了。

如果这阶段失败，可以带着前三阶段积累的资源、人脉、经验，去大厂做高管，大厂的人才和资金密度高，汇集一下，过几年带着大厂背书和更多的资源继续创业，成功概率大多了。
