    <script>
        // ═══════════════════════════════════════=

        const TITLE = '大模型 | 循环工程：从Addy Osmani的源头设计到正交优化架构';
        const CONTENT = `2026年6月，Google的Osmani、OpenClaw的Steinberger、Anthropic的Cherny，三个人几乎同时喊出一个口号：**提示词工程师已死，未来是循环工程的。**

于是全网炸了。爆款文满天飞，收藏量极高，看着很热闹。

但如果按照爆款文去面试、去开发、去交付，恐怕不会太满意。

Osmani是布道者，为了降低认知门槛，用原型解释循环工程。原型是一棵树，本身没错，但**距离能用的家具还很远**。比如，“Worktree”既有物理环境，又有逻辑调度，**违反单一职责原则**。比如，真正落地，还要有安全合规、规划反思、可观测...

爆款文大多按照发明者的原型，删删减减、东拼西凑，把树打扮了一下，配上漂亮的花盆，擦亮树叶，拍好照片发出来，放在客厅似乎很美。

等要面试了，拿着收藏的爆款文做模拟训练，会发现，哎，怎么这些东西结构不清晰啊，一团乱麻，算了算了，就这样吧，面试官也不一定懂，糊弄一下。

面试官可能不懂，但能看出对面是不是比他懂。

**你得能现场教会面试官才行，他才觉得你懂**。

如果面试官懂，他会问，“状态管理和任务调度如何保证独立演进？ ” 其实他问的是正交性和单一职责原则，爆款文哪有这个...

感觉自己绞尽脑汁回答挺多的，面完一星期没反馈，一问HR，挂了。

看着招聘网站那么多几十万上百万的年薪，怎么能拿到呢？

那必须得逻辑清晰，不迷信不跪拜，一眼识别陷阱，提前规避大坑，才可以拿到。

我们剖开Osmani的原型，用**正交性原则**重构，原子化为八大正交层，每一层且仅维护一个职责。同时验证过：这套新架构**完美覆盖原始论文的所有组件**，一件不少，只是更干净。

全文8000字，配完思维导图，星球专供。

我是昆尼Kunniaa，**大模型第一插眼 · 博弈论第一野王 · 十厄势第一破隐**。

**每日必更**，点个关注吧，**需要关注**，谢谢！`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
