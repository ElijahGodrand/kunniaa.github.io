        const CONTENT = `2005年，谷歌花5000万美元买下一个小公司Android。

二十年后，基于Andorid构建了巨大的收租机器：Google Play应用商店年收入850亿美元，毛利率70%。

**免费的系统和850亿的收入，中间隔着一场长达二十年的“温水煮青蛙”。**

第一阶段：免费开源，把所有手机厂商拉上船。塞班收费、Windows Mobile收费，安卓免费——厂商蜂拥而至。

第二阶段：慢慢把核心功能从开源版抽走，放进闭源的GMS里。厂商想出海卖手机？那就得装GMS。

第三阶段：开始收费。分辨率越高收费越高，高端手机每台交40美元授权费。用户已经用惯了Google Play、Gmail、YouTube，离开了GMS的手机在海外等于“功能机”。

谷歌**用足够长的时间，让所有人都离不开它。**

这就是**长期主义收割战略**——先亏十年、圈住用户、形成垄断、慢慢涨价。

安卓不是唯一。

亚马逊亏了十年做最低价零售，孵化了AWS云服务，年入千亿美元。

五大出版集团靠持续并购小出版社锁死了版权。

LVMH收购了上百个奢侈品牌，买断了百年文化资产。

Windows维持兼容性四十年，让全球形成几乎无法切换的软件生态系统。

**长期主义的终点：形成垄断、获得定价权、产生稳定现金流。**

谷歌的长期主义在其他领域是完全可复用的，具备七个条件必然成功：

① **必须面向C端**——个人用户有认知成本，一个品类记不住超过三个品牌；
② **底层需求必须稳定**——不会每隔几年就发生根本性变化；
③ **让产业链形成“囚徒困境”**——参与者越多，集体反抗越难，每个人都怕自己先跑吃亏；
... 

关键数据均标出了引用出处，避免幻觉。

全文一万四千字，星球见。

我是昆尼Kunniaa。

**每日必更**。`;
