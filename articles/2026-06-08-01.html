    <script>
        // ═══════════════════════════════════════=
        //  使用说明：改这两个变量即可
        // ═══════════════════════════════════════=
        const TITLE = '《置身钉内》：在失败的废墟上，看见撒马尔罕。附会员福利。';
        const CONTENT = `2009年，陈航踏入淘宝，花名“无招”。

彼时无人知晓，这个名字将如何与一段关于失败、重生与傲慢的故事相连。

一淘，败了。

来往，也败了。

2014年，他带着6个人退守湖畔花园。那是阿里巴巴的“龙兴之地”。这次，他要做钉钉。

起初无人看好，没有成熟的产品，没有市场的共识。失败者懂得谦卑，他们一遍遍敲开客户的门，陪笑脸，先承诺，再把东西做出来。

**失败教会人的永远比成功更深刻——低下头，看见真实，看见需求。**

钉钉成功了。

这是时代的机遇。那时企业协作的赛道上有三驾马车：飞书、企业微信、钉钉。

钉钉并非独一无二。

**与其说是钉钉的时代，不如说是时代的钉钉。**

2020年，阿里推“云钉一体”，无招不认同，明升暗降。2021年，离职创业。

2025年，阿里收购了无招的创业公司。他回归，再任钉钉CEO。

阿里人的大脑藏着一种精神病一样的狂妄。失败时，他们是谦卑的凡人；稍微触碰到成功，便觉得自己是神。

无招也不例外，早已自我封神。

为阿里立心，为蝼蚁立命，为钉钉开太平。

蝼蚁者，用户也。

神不需垂听，只需颁布圣谕。

蝼蚁不必理解，只需跪拜使用。

同年6月，《置身钉内》作者入职，做了一个名为“ONE”的梦。

2026年6月，梦醒，作者离职，写下7.5万字的《置身钉内》。

项目ONE的失败，是一场华丽的、令人啼笑皆非的错位。

它要同时实现大基数用户、高频使用、老板的控制欲、员工的好评、AI的入口……

“打进尖沙咀，我还想上月球呢。”

它既想当管理者的鞭子，又想当员工的棉袄。结果吃了一斤生蒜，挨了二十鞭子，最后罚了五十两银子。

“蝜蝂者，善负小虫也。行遇物，辄持取，卬其首负之。背愈重，虽困剧不止也。其背甚涩，物积因不散，卒踬仆不能起...”

这一切的荒诞，作者隐喻为城市撒马尔罕，中亚丝路上的明珠，是冒险家心中的终极梦想。

作者也许说的是小说《撒马尔罕》。因为这部小说与ONE项目的坠落，构成了一面千年之外的镜子。

故事的核心是一本诗集——诞生于十一世纪波斯的《鲁拜集》。作者海亚姆，天文学家，数学家，诗人。在那个以神之名禁锢一切的时代，他写下赞美美酒与爱情的四行诗，字字异端。但这本禁书没有死于火刑柱，它穿过伊斯兰世界的权力倾轧，穿过蒙古铁骑的尘埃，奇迹般地保存。

时间跳到二十世纪初。在伊朗立宪革命的炮火中，一个叫本杰明的美国学者踏上寻找《鲁拜集》的旅程。他在风暴中找到了那本手稿，也爱上了一位公主——仿佛所有流浪的珍宝都值得一段轰轰烈烈的救赎。

然后，命运开了一个优雅残忍的玩笑。这本熬过了千年战火、宗教迫害、帝国崩塌的诗集，被人带上了泰坦尼克号。它没有沉在波斯的沙漠，没有亡于征服者的铁蹄，却随着一艘与它毫无关系的豪华邮轮，永远葬身于北大西洋的冰海。

一部《鲁拜集》，半部中亚史。这本凝聚了波斯文明星光与无数人命运的精神宝藏，最终不是被强敌摧毁，而是被一次毫无关联的偶然轻轻带走了。

这本身就是一则哲学寓言：最珍贵的东西，往往不是死于迎面而来的刀锋，而是死于一个你从未防备的、温柔的、荒诞的意外。

ONE是钉钉的《鲁拜集》。它凝聚了巨大的心血，闪烁着某种宏大的光芒。但它偏离了最本质的东西——对海亚姆而言是诗性的自由，对ONE而言是用户的真实需求。于是它像那本登上了泰坦尼克的诗集一样，在一片混乱与失控中，缓缓沉没。

**会员福利：《置身钉内》PDF全文已上传知识星球。**`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
