    <script>
        // ═══════════════════════════════════════=
        //  使用说明：改这两个变量即可
        // ═══════════════════════════════════════=
        const TITLE = '深度分析 | 全球手机行业的终局';
        const CONTENT = `手机行业最新的数据出来，格局越来越清晰——说白了，这个行业基本上掌握在美国手里。苹果不用说了，纯美国公司；三星虽然挂着韩国牌子，但优先股七八成在美国资本手里，每年几百亿利润大部分分给了华尔街。

品牌三、四、五呢？（*前天写了一篇分析某个手机品牌的文章，被投诉侵权，以后为安全起见，对某些品牌不再提名字了。*）市场份额在降，利润在降，成本在涨。存储芯片一涨价，它们就扛不住——因为供应链不掌握在自己手里，核心零件依赖别人。

苹果在搞价格战，想吃掉中低端市场，用的是旗舰芯片配简配的“烤全羊”策略——用高端芯片让低端用户感觉被尊重，其他零部件减配，但利润和品牌溢价一点不少，低端机SE要打到三千多，直接卡进它们核心价位段。

后面还有印度在追，其本土品牌已经在印度市场超过了三星。

影像、折叠屏、快充，这些新功能能否构建护城河？

仗打到现在，还有什么悬念吗？手机行业的终局是什么样呢？

全文六千一百字，星球见。

我是昆尼Kunniaa。

**每日必更**。`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
    </script>
