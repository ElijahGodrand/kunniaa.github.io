    <script>
        // ═══════════════════════════════════════=
        //  使用说明：改这两个变量即可
        // ═══════════════════════════════════════=
        const TITLE = '大模型 | 大模型处理Excel自动重算，所有方案我们都试过了，只有这一条路走得通';
        const CONTENT = `有个企业客户，干了多年，积累了海量Excel计算文件，里面有各种公式、引用、VBA代码。现在想用大模型做自动化：用户输入条件，大模型填数，Excel自动算完，结果吐出来。

听着简单吧？我们一开始也这么想。

直到客户甩过来两个硬条件：必须跑在信创Linux上，历史文件一个都不能改。然后噩梦开始了。

LibreOffice无头模式？试了。

openpyxl等各种Python库？试了。

公式转代码的库？试了。

把市面上的大模型工作流框架翻了个底朝天？Dify、LangChain、n8n……全试了。

甚至还去翻了国外那个号称能算Excel的HyperFormula——还在早期阶段，用不了。

结果呢？都是死胡同。

折腾了一大圈，终于找到了唯一可行的方案。这条方案能跑通、能兼容VBA、能过合规审计。为了找到它，我们踩遍了很多能踩的坑。

这篇文章至少能帮你省下一个程序员一个月的试错时间。省一个月工资。

踩完这些坑之后，我们还总结出了两条重要的设计原则，适用于将来设计的任何东西。

全文五千六百多字，从技术方案到合规避坑，从VBA历史到两条普适的设计哲学，全部写清楚了。想直接拿走结论、少走弯路的，星球见。`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
    </script>
