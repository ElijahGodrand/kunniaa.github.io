        const TITLE = '大模型 | 功人功狗：刘邦与Anthropic在成功本质上的跨时空共振';
        const CONTENT = `**刘邦**：“**夫猎，追杀兽兔者狗也，而发踪指示兽处者人也。今诸君徒能得走兽耳，功狗也。至如萧何，发踪指示，功人也。**”

**伟人：“汉朝的刘邦是封建皇帝里边最厉害的一个”。**



Anthropic成立五年，估值已经快一万亿美金了。

可能令人觉得Anthropic的成功就是选对了赛道，做对了一个产品。

如果故事就这么简单，那没必要专门写一篇文章来讲它了。

真正的秘密，藏在这家公司的内部。

时间回到2020年到2021年之间，OpenAI内部发生了一次剧烈的裂变。那个时候，Dario Amodei是OpenAI的研究副总裁，负责过GPT-2和GPT-3的研发。他是那个时代最懂大模型怎么训练的人之一。但他跟OpenAI的领导层产生了根本性的分歧，这个分歧的核心是AI的安全问题。Dario认为AI正在变得太强大、太快，如果不加以控制，可能会给人类带来灾难性的后果。而OpenAI当时的领导层认为，应该更快地把产品推向市场，在商业化和安全之间，天平应该向商业化倾斜。

于是，在2021年，Dario带着妹妹Daniela和另外几位同事，离开了OpenAI，创立了Anthropic。

这个地方非常关键。要明白，这群人是从OpenAI出来的。他们带着对大模型最深刻的理解，带着最前沿的技术认知，带着世界上最聪明的头脑。但同时也带着一个致命的劣势——他们是从OpenAI出来的。

这句话的意思是，如果他们做跟OpenAI一样的东西，他们必死无疑。

OpenAI那个时候已经发布了GPT-3，已经在全球范围内建立了品牌认知，已经拥有了庞大的用户基础。ChatGPT虽然还没发布，但GPT-3已经让全世界知道了OpenAI是做什么的。Anthropic如果选择做一款通用的聊天机器人，跟OpenAI正面竞争，用户会怎么想？他们会说：“哦，又是一个模仿OpenAI的产品。我用ChatGPT用得好好的，为什么要换你？”

所以Anthropic从一开始就面临现实：做通用，打不过OpenAI。不是因为他们技术不行，是因为后来者永远要面对“用户迁移成本”这个壁垒。

他们必须找到一个OpenAI做不好、但自己能做到极致的领域。这就是定位理论里最经典的“细分市场领导者”策略——不要在巨头的核心战场上硬碰硬，要找一个巨头忽视或者做不好的侧翼，在那里建立自己的根据地。

他们选择了编程。

编程是大模型最擅长的领域。代码是形式语言，逻辑严密、结构清晰、反馈明确。大模型在处理这种结构化任务时，比处理开放式的自然语言更得心应手。这不是巧合，这是大模型的底层架构决定的。

编程是OpenAI的薄弱环节。OpenAI的ChatGPT什么都能做，但什么都不够精。在编程这个具体场景上，它并不比Anthropic强，甚至因为资源分散，反而更弱。Anthropic选择编程，相当于挑了一个OpenAI的软肋去打。

最重要的，编程是反馈速度最快的领域。写一段代码，一运行，立刻就知道对不对。编译报错，立刻看到；逻辑出错，立刻知道；结果不对，立刻发现。这种反馈是即时的、明确的、高度确定的。而在通用聊天场景下，回答好不好，反馈往往是模糊的、滞后的、充满噪音的。反馈速度决定了学习效率，学习效率决定了进化速度。Anthropic选择编程，等于选择了一条最快的进化跑道。

更精彩的还在后面。

Anthropic选择编程，不只是为了“避开OpenAI的锋芒”，不只是为了“找一个反馈快的领域”，更是为了形成一个极其精密的数据飞轮。

Anthropic把自己最顶级的人才、最昂贵的算力、最精良的数据，全部集中在编程这个点上。它不需要像OpenAI那样照顾几十种应用场景，它只需要做好一件事——让Claude的编程能力达到极致。

Claude在编程方面的表现越来越好，吸引了越来越多的程序员使用。程序员在使用Claude Code的过程中，产生了海量的代码数据——这些代码是真实的、高质量的、实时的。

这些代码数据被反馈到Anthropic的训练系统中，成为下一代Claude的训练数据。注意，这些数据不是网上能随便爬到的二手数据，它们是Anthropic自己的产品在实际使用中产生的第一手数据。这种数据的质量和稀缺性，是任何人都买不到的。

用这些高质量数据训练出来的下一代Claude，编程能力又上了一个台阶。能力更强的Claude，吸引更多的程序员使用，产生更多的高质量代码数据。

这个循环一旦转起来，就是一个自我强化的飞轮：越用越好，越好越用。

它不需要外部输入。OpenAI需要从互联网上爬数据，那些数据是有限的、固定的、用完就没有了。而Anthropic的飞轮是自循环的，它的产品本身就是数据生产机器，只要有人在用Claude Code，数据就在源源不断地产生。

它的质量越来越高。互联网上的公开数据良莠不齐，很多是低质量的。而Claude Code生成的代码，是在最优秀的程序员使用下产生的，质量远高于平均水平。用高质量数据训练出来的模型，自然比用垃圾数据训练出来的模型更强。

它的速度越来越快。因为反馈速度本身就快，所以这个飞轮每转一圈的时间很短。别人转一圈要一个月，Anthropic可能只需要一天。这就是为什么它能连续四年保持每年十倍的增长——不是因为它比对手聪明十倍，而是因为它的反馈回路比对手快十倍。

所以Anthropic从OpenAI出来之后的选择，表面上是被迫的——做通用的打不过，只能做细分。但实际上，这个“被迫”的选择恰好落在了反馈速度最快的领域，恰好形成了最强的数据飞轮，恰好让它在编程这个点上建立了牢不可破的护城河。

Anthropic最初的选择，也许带着一种“被逼无奈”的色彩——没有哪个创业者会主动选择一条更窄的路。但正是在看似被动的选择中，他们做出了一个与OpenAI截然不同的决策：放弃跟随OpenAI的通用路线，转而聚焦编程这个OpenAI做得不够好的领域。

这个决策，在当时可能只是为了“活下来”。但事后证明，这个选择恰好踩中了**两个关键节点：反馈速度最快的领域，加上自我强化的数据飞轮**。当初的“被逼无奈”，反而成就了他们今天的“降维打击”。

这个逻辑链条太清晰了。

**被迫选择细分→细分恰好是反馈最快的领域→反馈快导致进化快→进化快形成数据飞轮→数据飞轮建立护城河→护城河让后来者无法追赶。**

每一个环节都环环相扣，缺一不可。如果Anthropic当初没有从OpenAI出来，它不会有这个选择的机会。如果它出来后选择了做通用，它会被OpenAI碾压。如果它选择了编程但编程的反馈速度不快，它的飞轮转不起来。如果飞轮没转起来，它不可能在五年内追上并反超OpenAI。

所以Anthropic的成功，是必然中的偶然，也是偶然中的必然。

必然的是：从OpenAI出来的这群人，注定要找到一个巨头做不到极致的细分市场。偶然的是：他们恰好找到了编程这个反馈速度最快、最适合形成飞轮的领域。而必然中的必然：一旦这个飞轮开始转动，结果就是不可逆转的——后来者再也追不上它了。

好，讲到这里，**我们可以从这个具体的案例中提炼出一个更抽象的规律。这个规律，可以判断任何事业值不值得做**。

这个规律就是——**做的那个东西，它的产出必须能反过来强化它自身。如果不能，那就不要做**。

比如工业母机就是最典型的例子。母机是制造机器的机器。它生产出来的产品，是用来制造其他机器的。但这个产品本身，也能用来强化它自己。一开始，用一台精度一般的机床，造出了一批零件。然后把这些零件里的最优品挑出来，用它们组装一台新的机床。这台新机床的精度，比原来那台高一些。然后再用这台新机床去生产更好的零件，再用更好的零件组装精度更高的机床。一步一步，左脚踩右脚，精度越来越高，产品越来越好。机床的产出是机器零件，这些零件反过来又用来制造更好的机床。一代比一代强，一代比一代精。工业革命的本质，就是人类找到了一条“自我强化的制造之路”——通过制造更好的机器，来制造更好的机器。

软件开发也是一模一样的逻辑。早期的软件没有图形界面。程序员在终端里敲命令，黑屏白字，一行一行地敲。后来有人想，能不能做得好看一点？于是有了简单的RGB图形界面——红绿蓝三色，能画个框、画个按钮。再后来，技术升级了，有了真彩色，画面开始丰富起来，颜色越来越多，从256色到65536色，再到后来的千万色。图片变清楚了，界面变漂亮了，软件功能也越来越强大了。新一代的软件工具，本身就是用上一代的软件工具开发出来的。用上一代的IDE写了这一代的IDE，然后这一代的IDE功能更强大、界面更好看，又用它去写下一代的IDE。层层递进，螺旋上升。每一次产出的成果，都成为下一次升级的基础。

回到Anthropic，它的飞轮就是“工业母机”逻辑在AI领域的完美映射。Claude Code生成的代码，是它的“产出”。这个产出的质量越高，它用来训练下一代Claude的数据质量就越高。下一代Claude的编程能力更强，生成的代码质量更高。每一代的产出都成为下一代的基础，跟机床一代比一代精度更高，跟图形界面一代比一代更漂亮，完全是一回事。

反过来看，那些没有“产出强化自身”闭环的生意，是什么样子？比如开一家餐馆，做出来的菜不能用来做更好的菜。炒了一盘宫保鸡丁，吃了就没了，它不会让下一盘宫保鸡丁变得更好吃。要想把菜做得更好，得从外面找更好的厨师、买更好的食材、换更好的厨具。这些东西都不是“产出”，都是从外面“消耗”来的。每一顿饭都是重新开始，没有任何积累。这就叫熵增，做十年餐馆，可能还是那个水平，可能比原来更累、更不赚钱。因为做的那个东西，它的产出没有反过来强化它自身。

所以各位，**这个世界上的生意只有两种。一种是“越做越强”的，一种是“越做越累”的**。越做越强的，一定符合“产出强化自身”的原则。越做越累的，一定不符合。

在选择做事之前，只需要问自己一个问题：我做出来的东西，能不能反过来让我更强？如果能，你就应该做。如果不能，就该思考一下，值不值得浪费这个时间。

好，飞轮的逻辑讲完了。但这个故事还有一个更深层的维度。

2026年6月，彭博社发了一篇报道，揭露了Anthropic内部一个**极其反常识的组织结构**。

作为一家估值近万亿美元公司的CEO，**Dario Amodei只有一个直接下属**。

没听错，只有一个。就是他的幕僚长Avital Balwit。

**公司所有的高管——CFO、首席商务官、所有部门的负责人——都不向他汇报。他们全部向Dario的妹妹、Anthropic的总裁Daniela Amodei汇报。Daniela负责公司的全部日常运营，对董事会负责**。

这在科技行业是极其罕见的。当下的科技行业，CEO直接管的人越来越多。英伟达的CEO黄仁勋直接管60个人，OpenAI的CEO Sam Altman管大约6个。而Dario只管1个，完全反着来。

他为什么这么做？

Dario的背景是学术研究者，普林斯顿大学生物物理学博士，之前在谷歌和OpenAI做研究。他不是职业经理人。他认为CEO最大的价值在那些“zoom out”的事情上：战略方向、研究判断、组织文化、思考AI对人类文明的影响。这些事需要大块不被打断的时间。而日常管理——“zoom in”——会把时间切碎，让人没法思考大问题。

他的原话是：“如果明天有一大堆事情等着处理，你就很难关注战略全局。”所以他把两件事彻底分开，自己只做前者，后者全交给妹妹。

他把大约一半时间花在文化建设上。方式就是每两周开一次全员会，叫“Dario Vision Quest”，他自己写一份长备忘录然后花一小时讲。他最担心的是：公司从几百人快速膨胀到两千五百人，大量新员工来自大科技公司，如果不主动灌输Anthropic的文化，这些人会默认复制前公司的做法，公司文化就会被稀释。

剩下的时间花在研究方向、战略和写长篇公开文章上。他花大量时间思考AI对人类文明意味着什么，并通过长篇公开文章输出。

**管理者的时间是最稀缺的资源**。

大多数公司的CEO把时间花在开会、审批、汇报、面试、处理危机。这些事情把CEO的时间切得粉碎，让他们根本没有整块的时间去思考真正重要的问题。而Anthropic用了一个极其反常识的组织结构，把CEO的时间保护了起来，让他可以专注于只有他能做的事情——在混沌中发现方向。

还有一个细节：Anthropic的全部七位联合创始人至今都还在公司。在科技创业公司里，联合创始人陆续离开是常态，七个人全留下来确实罕见。Amodei兄妹把这一点当作公司文化凝聚力的证明。

公元前202年，刘邦平定天下后论功行赏，萧何被评为第一功臣。群臣不服，说我们冲锋陷阵、身经百战，萧何从未上过战场，凭什么功第一？

**刘邦**说了一段非常有名的话：“**夫猎，追杀兽兔者狗也，而发踪指示兽处者人也。今诸君徒能得走兽耳，功狗也。至如萧何，发踪指示，功人也。**”

翻译过来就是：打猎的时候，追杀兔子的是猎狗，但发现兔子踪迹、指挥猎狗去追的，是人。各位不过是“功狗”，而萧何是“功人”。

**刘邦的逻辑很清楚：真正决定胜负的，是那个能“发踪指示”的战略家，而不是执行命令的人。**

1964年，有位伟人在一次谈话中说：“**汉朝的刘邦是封建皇帝里边最厉害的一个**。”

刘邦的天赋不是亲自做事，而是在一片混沌中，判断出“张良是对的”、“萧何是对的”、“韩信是能打仗的”。**这种在反馈几乎为零的情况下**，识别出正确的人和正确的方向的能力，是整个秦末乱世中最稀缺的天赋。

项羽输了，因为项羽自己就是最顶级的“功狗”——他亲自冲锋陷阵，战无不胜，但被刘邦用“功人加功狗”的体系活活耗死。

Anthropic是一模一样的逻辑。

**Dario Amodei就是Anthropic的“功人”。他是那个在混沌中发现方向的人。他在反馈几乎为零的领域——AI的安全边界在哪、下一代模型的技术路线怎么选——做出了关键的判断。他不需要亲自写代码，不需要亲自管运营，他只需要做一件事：判断方向。**

**Daniela Amodei和她的执行团队就是Anthropic的“功狗”。她们负责把战略落地，负责日常运营，负责让公司这部机器高速运转。她们在明确的指令下快速行动。**

咱们刚才把“功人”和“功狗”的框架讲清楚了。现在，咱们来回答一个更根本的问题——什么样的人是“好狗”，什么样的人是“坏狗”？

各位，这个问题其实非常简单。

猎狗最重要的品质是听命令。主人一指方向，它“嗖”一下就蹿出去了。追到一半，主人喊“停”，它立刻停。主人说“换个方向”，它立刻掉头。猎狗的成功，就建立在对主人指令的即时响应上。它不需要思考方向对不对，它只需要执行。它获得反馈的速度就是最快的——主人一喊，它就跑；跑错了，主人一吹哨，它立刻改。

反过来，如果一条猎狗不听命令，主人让它追兔子，它去追野鸡；主人让它停，它非要往前冲。这种狗在打猎的时候就是废物。为什么？因为它拒绝反馈。它不接收信号，不根据信号调整自己的行为。

所以，**“好狗”和“坏狗”的差别，本质上就是一个：是否接受反馈。接受反馈，立刻改正，就是好狗。拒绝反馈，对抗反馈，就是坏狗。**

把这个逻辑映射到人和组织中，会发现一模一样。

我们在公司里，经常能看到两种人。一种人，给他一个反馈，说“这个地方做得不好，应该这样改”，他马上回应“好的，我立刻调整”。第二天再看他做的东西，果然改了。这种人，就是组织里的“好狗”。他们可能不是最聪明的，可能不是最有创造力的，但他们是世界上最可靠的。因为他们不消耗管理者的精力。

另一种人，给他一个反馈，他第一反应是辩解：“不是我的错，是因为某某某没配合好。”或者找借口：“我已经尽力了。”或者反过来质疑：“你凭什么这么说？”这种人，就是组织里的“坏狗”。他们不是能力不行，他们是拒绝接收信号。给他反馈，他就竖起一道防火墙，把信号挡在外面。这样的人，能力再强都不能大用。为什么？因为指挥不动他。

所以，刘邦的道理到今天依然适用。好狗，就是反馈快。坏狗，就是反馈慢或者拒绝反馈。

那“功人”呢？

**功人靠的不是接受反馈，而是在没有反馈的环境里自己找到方向。**

张良给刘邦出谋划策，“要先入关中”、“要约法三章”。这些建议，在刘邦采取行动之前，没有任何反馈。没有任何数据告诉张良“这个主意是对的”。张良的判断，完全建立在他对形势的推演、对人性的洞察之上。这是一种在反馈稀缺的环境里，凭借天赋和直觉找到正确方向的能力。

**“功人”和“功狗”的核心区别，不是一个管战略一个管执行，而是一个在反馈稀缺的环境里运作，一个在反馈密集的环境里运作。**

**功狗需要的是快速响应，功人需要的是深度判断。功狗靠的是执行力，功人靠的是天赋直觉。**

这也就解释了，为什么“功人”这么稀缺。因为大多数人，是不具备在低反馈领域做判断的能力的。

如果不是“功人”怎么办？如果在反馈稀缺的领域里没有方向感，是不是就注定失败了？

也不一定。在反馈很慢的领域，想成功，有两种方法。

第一种，本身就有天赋。就是那种在混沌中能听见微弱风声的人。就是张良。这种情况下，可以直接去当“功人”，寻找方向，做出判断。

第二种，没有天赋，但可以主动去找那些有天赋的人。找一个“功人”跟着，让他告诉你方向。跟他交流，让他给你反馈。这个过程，本质上是把“低反馈领域”转化成了“高反馈领域”。不是靠自己的直觉去判断方向，而是靠高人的反馈来修正方向。

这也是为什么，那些成长最快的人，往往跟对了师傅。他们可能自己找不到方向，但他们的师傅能找到。师傅告诉他们往哪走，他们就往哪走；师傅告诉他们错了，他们就立刻改。这就是在低反馈领域里，通过跟高人交流来获得反馈。

所以，对于大多数人来说，最好的策略不是硬逼着自己去当“功人”——因为那不是努力能解决的问题。最好的策略是：要么选一个反馈快的领域做“功狗”，要么靠近“功人”，通过高频交流来获得反馈。

讲到这里，咱们必须把问题再往前推一步。这个问题比刚才的更加直接，也更加残酷——如果真的想获得成功，必须先搞清楚自己到底是什么资质。

各位，这个问题太重要了，重要到它决定你这一辈子能走多远、能爬多高。很多人的失败，不是因为他们不努力，而是因为他们搞错了自己的位置。一个明明适合当“功狗”的人，非要去当“功人”，结果把团队带得乱七八糟。一个明明适合当“功人”的人，非要去当“功狗”，结果把自己憋屈得要死，还跟周围人冲突不断。

这话难听，但这是刘邦说的，刘邦是封建帝王里最厉害的一个，他说的咱们得听。

如果是一个反应极快的人，善于在明确的指令下高效执行，得到了反馈能立刻调整、立刻改进，那就是一个天生的“好狗”。记住，“好狗”这个词不是骂人的，不是贬义的。刘邦当年把那些冲锋陷阵的将领比作“功狗”，那些将领是韩信、彭越、英布，是能带兵打仗、攻城略地的猛人。这些人放到现在，就是顶级CEO、顶级执行者、顶级技术专家。他们对指令的响应速度极快，他们能把战略落地。“好狗”是所有组织里最核心的力量，没有“好狗”，“功人”的想法永远停留在纸面上。

但是，**“好狗”有一个致命的禁忌——千万不要自作主张**。一条猎狗，主人让它追兔子，它就追兔子。主人让它停，它就停。主人让它换方向，它就换方向。不要自己去判断“兔子在哪”，那是主人的事。如果自作主张，看到一只野鸡就跑去追，主人喊也不听，那就从“好狗”变成了“坏狗”。不但帮不上忙，还会坏事。

我们在现实中看到太多这样的人了。他们能力很强，执行力很好，但就是喜欢自作主张，喜欢自己判断方向。让他往东，他偏要往西；告诉他错了，他非要辩解。这种人，能力越强，破坏性越大。因为他不听话，不接受指令，不承认自己是一条需要接受反馈的狗。

反过来，如果那种善于在迷茫中找到方向、在没有任何反馈的情况下能判断出正确道路的人，那就是一个天生的“功人”。“功人”的天赋是在大家都看不清的时候，能看清。是在反馈几乎为零的时候，还能做出判断。刘邦说“运筹策帷帐之中，决胜于千里之外”，这就是“功人”做的事。

但是，**“功人”也有一个致命的禁忌——如果是一个“功人”，千万不要自己去当“功狗”**。如果擅长的是判断方向、制定战略，就要把这个事情做到极致。不要自己去写代码，不要自己去跑业务，不要自己去管日常琐事。要找到优秀的“功狗”来执行你的战略。

现实中也有太多这样的例子了。一些创始人，明明是个“功人”的天赋，却非要去管日常运营，非要自己去盯每一个细节。结果把自己搞得疲惫不堪，还把团队搞得怨声载道。因为他干的是自己不擅长的事，而且他管的人也是“功狗”，两拨人的思维方式完全不同，必然冲突。

所以，归根结底就一句话：**认识你自己**的禀赋。你是什么样的人，就去做什么样的事。你是“功狗”的料，就当最好的“功狗”；你是“功人”的料，就当最好的“功人”。

两千年过去了，刘邦的功人功狗论颠扑不破。
