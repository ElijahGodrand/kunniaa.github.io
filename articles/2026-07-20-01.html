    <script>
        // ═══════════════════════════════════════=

        const TITLE = '深度分析 | Vivo为什么无法离开印度，还不得不继续投资印度？';
        const CONTENT = `Vivo在印度，被冻结账户、抓走高管、逼着交出控股权，还要继续往火坑里砸钱。

2014年，vivo进入印度，投65亿建工厂。

2025年，登顶印度市场第一，出货3210万部。

然后刀落下来了——账户冻结、高管被捕、税务罚单一张接一张，最后印度说：要么把51%控股权交出来，要么离开。

vivo选了前者，也就意味着65亿投资以及在印度的一切都会被抢走。

不觉得很奇怪吗？一家年赚上百亿的巨头，在印度十几年累计利润不到8亿，被收割到骨头都不剩，为什么还在死撑？

那如果当初它没在印度建厂，又会怎样？

**供应链，出货量，折扣，价格优势**......

能破局吗？

全文三千六百字，星球见。

我是昆尼Kunniaa，**大模型第一插眼 · 博弈论第一野王 · 十厄势第一破隐**。

**每日必更**。`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
    </script>
