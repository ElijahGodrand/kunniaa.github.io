    <script>
        // ═══════════════════════════════════════=
        //  使用说明：改这两个变量即可
        // ═══════════════════════════════════════=
        const TITLE = '大模型 | SOLID原则在大模型时代：为什么30年前的软件设计原则，成了AI工程的救命稻草';
        const CONTENT = `一个好消息和一个坏消息。

坏消息是：公司开始用大模型了，AI帮忙写代码、跑流程，效率翻倍。但三个月后发现，Agent开始乱说话了，改一个提示词崩三个功能，想换个大模型发现接口全要重写。系统像一堆随时会塌的积木。

好消息是：这不是一个公司的问题，是所有公司都在踩的坑。

最近写了一篇长文，讲的是为什么**SOLID原则在大模型时代为什么反而更重要了**——没看错，就是三十年前软件工程的五条原则。

但这篇文章牛逼在哪？它用听得懂的方式解释为什么这五条原则能拯救复杂的大模型项目。比如：

**“单一职责”**——为什么嘴和肛门分开是人类进化史上最牛逼的设计之一？

**“开闭原则”**——为什么脊椎动物的脊柱五亿年没大改，但四肢随便进化？

**“里氏替换”**——为什么换零件不出事才是好设计？

**“接口隔离”**——为什么口腔和胃绝不能共用同一个口？

**“依赖倒置”**——谁定义接口，谁就掌握主动权。

大模型时代，工具每三个月换代一次。不遵循这些原则，系统就是纸糊的——换个大模型就得重写，加个功能就崩一片。遵循这些原则，换底层、换工具、换模型，上层业务纹丝不动。

全文4000字，星球专供。

我是昆尼Kunniaa，**大模型第一插眼 · 博弈论第一野王 · 十厄势第一破隐**。

**每日必更**。`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
