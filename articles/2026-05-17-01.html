<body class="min-h-screen">

    <script>
        // ═══════════════════════════════════════=
        //  使用说明：改这两个变量即可
        // ═══════════════════════════════════════=
        const TITLE = '大模型 | 我刷了83套AI Agent面试题，112轮面试，总结出7种必考算法——不会的话，大概率要挂';
        const CONTENT = `AI领域的就业，现在最火的方向就是Agent。不信你去某勾、某聘、某猎搜一下——Agent评测、Agent开发、资深Agent工程师、Agent解决方案架构师、Agent产品经理、项目经理、运营……每天挂着几百个职位。薪资从入门12K到顶层70K，上升空间巨大。

但问题来了：**这些职位面试到底问什么？怎么准备才能稳过？**

我花了几个月时间，收集了83套真实AI Agent面试题（来自大中小厂，覆盖112轮面试）。把这近千道题拆开、归类、统计词频后，我画出了一张大模型全流程的“面试考点地图”：

> 数据预处理（Tokenizer）→ 模型架构 → 预训练 → 微调与对齐 → 推理优化 → RAG与知识增强 → Agent与框架 → 评估监控

然后我惊讶地发现：**面试官根本不爱背八股文，他们只问“亲自做过才知道”的细节。**

比如——

- 问BM25：不问你定义，而是问你“为什么引入它？比例怎么调？具体流程走一遍？”
    
- 问rerank：不问你概念，而是问你“返回多少块？怎么验证？topk截断的依据？有没有备选方案？”
    
- 问DPO：不问你听过没有，而是直接让你写loss公式，再追问“PPO里reward模型打完分，你是怎么排序的？”
    

没亲自做过的人，听到这些问题就会汗毛直竖头皮发麻。但**先刷过真题，再倒回去做一遍项目**，你的感触会深到面试官都骗不了你。

我从83套题里，按全流程筛出了**面试中出现频率最高的算法/技术**：

| 环节          | 高频考点                               |
| ----------- | ---------------------------------- |
| **微调与对齐**   | GRPO、DPO、LoRA、SFT、PPO、Reward       |
| **模型架构**    | Transformer、MOE、Attention、RoPE     |
| **RAG与检索**  | RAG、BM25、rerank                    |
| **Agent决策** | ReAct、Reflexion、LangGraph          |
| **推理优化**    | vLLM、flash attention、PageAttention |

如果连这些词都没听过，或者只背过概念，那现在去面试，大概率就是陪跑。

但反过来——如果手里有多套**真实面试原题**，知道每一道题是怎么问的、面试官想听什么、坑在哪里，那就能**倒推回去，精准补齐短板**。每一道题都是面试前必须过一遍的“子弹”。`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
    </script>
