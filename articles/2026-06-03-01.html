    <script>
        // ═══════════════════════════════════════=
        //  使用说明：改这两个变量即可
        // ═══════════════════════════════════════=
        const TITLE = '大模型 | 小白游戏Agent魔修指南';
        const CONTENT = `我这人没啥爱好，就喜欢扒皮财富，研究各位大佬怎么搞钱。

前阵子扒了两家创业公司，人均融资额高得离谱——第一家，人均一千多万；第二家，人均六千多万。你问我眼红不眼红？我特么直接化身树蛙精。

拆解高薪也是我的业务范围。昨天刚拆了一个岗位：游戏Agent开发，月薪30k~60k。在现在这就业形势底下，这已经不是不错了，是坟头蹦迪惊喜。

拆完不过瘾，我又写了篇“小白游戏Agent魔修指南”，扔星球里了。八千多字，写得我手都快断了——不是夸张，是真的腱鞘炎发作。

这篇指南讲什么？很简单：一个小白怎么在30天内变成能拿offer的游戏开发工程师。每一步、每个坑、每个偷懒的骚操作，都写明白了。

游戏行业卷得很，但如果你缺钱，暂时没有别的路子，可以赌一下，做个一两年就收手。

> **💰 钱：30天后，月薪3-6万**  
> 大家的梦想是不工作。但在这之前，先谈钱。游戏开发工程师的起薪就在这个区间，只要你真能干活。

> **⚡ 爽：教你“偷”老板和同事的经验**  
> 终极心法“职场偷师”——老板和同事脑子里最有价值的那点东西，怎么不动声色地学到手。

> **🛠️ 工具：打开就能用，每天有清单**  
> 把30天拆成每天2-3小时的具体任务。不用费心，打开教程，照着做。

> **👨‍👩‍👧‍👦 利他：你可以顺手救一个人**  
> 如果你家里有正在迷茫的弟弟妹妹、侄子外甥、或者那个每天打游戏还跟你哭穷的朋友，把这篇文章截图甩给他。看完如果照做，30天后他的人生可能就不一样了。你的一次转发，可能改变一个人的轨迹。我毕业时找工作，赶上金融危机，花了三个月学了一个新东西才找到的，至少两个月在试错，想起来有点郁闷。

以上每一条，都不是夸张，是夸张我吃导热硅脂。

有不懂的地方，或者想跟我讨论的，在这篇指南下面评论问。每条都回，先暂定回复一年。如果感兴趣的人多了，可以延长到退休——反正我也没别的事。

也许这几十块钱是你今年花得最值的一笔。如果不是？三天内可退款，不会有损失的，哈哈。`;
        // ═══════════════════════════════════════

        document.getElementById('article-title').textContent = TITLE;

        const contentDiv = document.getElementById('article-content');
        const paragraphs = CONTENT.split('\n\n');

        paragraphs.forEach(para => {
            const trimmed = para.trim();
            if (!trimmed) return;
            const p = document.createElement('p');
            p.innerHTML = trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            contentDiv.appendChild(p);
        });
    </script>
